<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة مارفل العسكرية | النظام الموحد</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <style>
        /* التصميم العسكري الموحد */
        :root {
            --m-green: #2d5a27;
            --m-dark: #050505;
            --m-border: #1a3317;
            --m-red: #ff0000;
        }

        body {
            background-color: var(--m-dark);
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            overflow: hidden; /* لمنع الخروج عن الإطار */
            user-select: none;
        }

        /* بوابة التحقق */
        #auth-gateway {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #0d1a0b 0%, #000 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .military-panel {
            border: 2px solid var(--m-green);
            padding: 40px;
            text-align: center;
            background: rgba(0,0,0,0.8);
            box-shadow: 0 0 20px var(--m-green);
        }

        .btn-discord {
            background: #5865F2;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
        }

        /* شاشة النظام */
        #main-system { display: none; padding: 20px; }

        /* اللوقات */
        .logs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .log-box {
            background: #111;
            border: 1px solid #333;
            height: 150px;
            overflow-y: auto;
            font-size: 12px;
            padding: 5px;
            font-family: monospace;
        }

        /* العين الحمراء عند الغش */
        .eye-alert {
            animation: red-blink 0.5s infinite;
        }
        @keyframes red-blink {
            0% { box-shadow: inset 0 0 50px red; }
            100% { box-shadow: inset 0 0 100px red; }
        }

        footer {
            position: fixed;
            bottom: 0; width: 100%;
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="auth-gateway">
        <div class="military-panel">
            <h2>هيئة تنظيم الدورات العسكرية</h2>
            <h3>دولة مارفل</h3>
            <p>النظام الموحد للاختبارات الإلكترونية</p>
            <button class="btn-discord" onclick="verifyIdentity()">التحقق من الهوية الرقمية</button>
        </div>
    </div>

    <main id="main-system">
        <h2 id="page-title">جارِ تحميل القطاع...</h2>
        
        <div id="commander-controls" style="display:none;">
            <button onclick="globalLock()" style="background:red;">قفل النظام الشامل</button>
            <button onclick="factoryReset()">تصفير المنظومة</button>
            <div class="logs-grid" id="logs-area">
                </div>
        </div>

        <div id="exam-area" style="display:none;">
            <div id="timer">المتبقي: 00:00</div>
            <div id="questions"></div>
            <textarea placeholder="المسودة العسكرية للطالب..."></textarea>
        </div>
    </main>

    <footer id="footer-secret" style="opacity:0" ondblclick="secretEntry()">
        هيئة تنظيم الدورات العسكرية
    </footer>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAALZ-v8wA_5mjUVSqW1uLXMwMkskpDaGM",
            authDomain: "mmca-authority.firebaseapp.com",
            databaseURL: "https://mmca-authority-default-rtdb.firebaseio.com",
            projectId: "mmca-authority",
            storageBucket: "mmca-authority.firebasestorage.app",
            messagingSenderId: "105278081999",
            appId: "1:105278081999:web:2a888dac689a6baa6ca0ba"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // نظام الحماية
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0))) {
                triggerAlert();
                return false;
            }
        };

        window.onblur = function() { triggerAlert(); };

        function triggerAlert() {
            document.body.classList.add('eye-alert');
            // تسجيل لوق محاولة غش
            saveLog("لوق الغش", "محاولة خروج من الصفحة أو فتح أدوات المطور");
        }

        // الدخول والتحقق
        function verifyIdentity() {
            let code = prompt("أدخل كود الوصول العسكري:");
            
            document.getElementById('auth-gateway').style.display = 'none';
            document.getElementById('main-system').style.display = 'block';

            if(code === "9999") {
                showPresident();
            } else if(code === "0101") {
                showMembers();
            } else {
                showExam();
            }
        }

        function showPresident() {
            document.getElementById('page-title').innerText = "لوحة السيادة الإدارية";
            document.getElementById('commander-controls').style.display = 'block';
            createLogs();
            saveLog("لوق دخول الرئيس", "الرئيس دخل النظام");
        }

        function createLogs() {
            const logNames = [
                "لوق الدخول والخروج", "لوق الأعضاء", "لوق الرئيس", 
                "لوق القبول والرفض", "لوق بدء الاختبار", "لوق الإجابات",
                "لوق التصحيح", "لوق الغش", "لوق التلاعب", "لوق محاولة الدخول",
                "لوق التعديلات", "لوق الإضافات", "لوق الحذف", "لوق الطوارئ"
            ];
            let html = "";
            logNames.forEach(name => {
                html += `<div class="log-box"><strong>${name}</strong><div id="${name}"></div></div>`;
            });
            document.getElementById('logs-area').innerHTML = html;
        }

        function saveLog(type, message) {
            db.collection("logs").add({
                type: type,
                message: message,
                time: new Date().toLocaleString()
            });
        }
        
        // منع النسخ
        document.addEventListener('copy', (e) => {
            e.preventDefault();
            triggerAlert();
        });

    </script>
</body>
</html>
