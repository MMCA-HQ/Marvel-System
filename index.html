<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة هيئة تنظيم الدورات | دولة مارفل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #00d4ff; --gold: #ffcc00; --red-alert: #ff4b2b;
            --bg-dark: #050507; --card-bg: #0d0d12; --member-blue: #00a8ff;
        }

        body {
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark); color: white; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050507 100%);
            overflow: hidden; transition: border 0.3s ease;
        }

        body.alert-border { border: 8px solid var(--red-alert); box-shadow: inset 0 0 50px var(--red-alert); }

        .page-section { display: none; width: 100%; max-width: 1000px; padding: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* نظام التنبيهات المخصص (بديل رسالة المتصفح) */
        #customAlert {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(13, 13, 18, 0.95); border: 1px solid var(--primary-glow);
            padding: 15px 30px; border-radius: 10px; z-index: 9999;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); color: white; text-align: center;
        }

        /* واجهة الدخول */
        #loginPage { display: block; text-align: center; max-width: 420px; }
        .system-container {
            background: var(--card-bg); padding: 50px; border-radius: 25px;
            border: 1px solid rgba(0, 212, 255, 0.15); box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        /* نظام الأسئلة (واحد تلو الآخر) */
        #examPage { max-width: 600px; text-align: center; }
        .question-box { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #222; margin-top: 20px; }
        .option-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            background: #000; border: 1px solid #333; color: white;
            border-radius: 10px; cursor: pointer; transition: 0.3s; font-family: 'Cairo';
        }
        .option-btn:hover { border-color: var(--primary-glow); background: #0a0a15; }
        .option-btn.selected { border-color: var(--primary-glow); background: rgba(0, 212, 255, 0.1); }

        /* التوقيت */
        #timerDisplay { position: fixed; top: 20px; left: 20px; font-weight: 900; color: var(--primary-glow); font-size: 1.5rem; }

        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; text-align: center; font-family: 'Cairo'; }
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; }

        #secretOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 5000; justify-content: center; align-items: center; }
        footer { position: fixed; bottom: 20px; width: 100%; text-align: center; display: none; }
        .rights-text { font-size: 0.8rem; color: #111; cursor: default; user-select: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="customAlert">تم التحقق بنجاح</div>

    <div id="loginPage" class="page-section">
        <div class="system-container">
            <div style="color: var(--primary-glow); font-size: 0.9rem; font-weight: bold;">هيئة تنظيم الدورات العسكرية</div>
            <h1 style="font-size: 3rem; margin: 0; background: linear-gradient(to bottom, #fff, #555); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">دولة مارفل</h1>
            <div id="displaySubtitle" style="color: #666; font-weight: bold; margin-bottom: 30px;">النظام الموحد للاختبارات الإلكترونية</div>
            <button class="btn-action" style="background: #5865F2; color: white;" onclick="startVerification()">التحقق من الهوية الرقمية</button>
        </div>
    </div>

    <div id="examPage" class="page-section">
        <div id="timerDisplay">10:00</div>
        <div style="color: var(--primary-glow); font-size: 0.8rem; margin-bottom: 10px;" id="questionStep">السؤال 1 من 5</div>
        
        <div class="question-box">
            <h3 id="questionText" style="margin-bottom: 25px;">جاري تحميل المهمة...</h3>
            <div id="optionsContainer"></div>
        </div>

        <button id="nextBtn" class="btn-action" style="background: var(--primary-glow); color: #000; margin-top: 25px; display: none;" onclick="nextQuestion()">السؤال التالي</button>
    </div>

    <div id="presidentPanel" class="page-section">
        <h2 style="border-bottom: 2px solid var(--gold);">مركز القيادة والسيطرة</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
            <div style="background:#111; padding:20px; border-radius:15px;">
                <h3>⚙️ إعدادات الواجهة</h3>
                <input type="text" id="newSubtitle" placeholder="تغيير مسمى الدورة">
                <button class="btn-action" style="background: var(--gold);" onclick="saveData('customSubtitle', 'newSubtitle')">تحديث المسمى</button>
            </div>
            <div style="background:#111; padding:20px; border-radius:15px;">
                <h3>🚫 سيادة النظام</h3>
                <button class="btn-action" style="background: var(--red-alert); color: white;" onclick="toggleLock()">قفل / فتح المنظومة</button>
                <button class="btn-action" style="background: #333; color: white; margin-top:10px;" onclick="resetSystem()">تصفير شامل</button>
            </div>
        </div>
    </div>

    <div id="secretOverlay">
        <div style="text-align: center;">
            <div style="color: var(--primary-glow); margin-bottom: 15px;">نظام الصلاحيات العليا</div>
            <input type="password" id="accessKey" maxlength="4" placeholder="••••" oninput="checkKey()" style="font-size: 2.5rem; letter-spacing: 15px;">
        </div>
    </div>

    <footer id="mainFooter">
        <div class="rights-text" id="adminTrigger">هيئة تنظيم الدورات العسكرية</div>
    </footer>

    <script>
        // منع النسخ
        document.onkeydown = (e) => { if (e.keyCode == 123 || (e.ctrlKey && (e.keyCode == 67 || e.keyCode == 85))) return false; };

        // العين الحمراء
        window.onblur = () => document.body.classList.add('alert-border');
        window.onfocus = () => document.body.classList.remove('alert-border');

        // تنبيه مخصص فخم
        function showAlert(msg) {
            const el = document.getElementById('customAlert');
            el.innerText = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3500);
        }

        function startVerification() {
            if(localStorage.getItem('systemLocked') === 'true') return showAlert("المنظومة مغلقة حالياً");
            document.getElementById('mainFooter').style.display = 'block';
            showAlert("تم التحقق. للدخول للإدارة، انقر مرتين على نص الهيئة في الأسفل.");
            setTimeout(startExam, 2000);
        }

        document.getElementById('adminTrigger').ondblclick = () => {
            document.getElementById('secretOverlay').style.display = 'flex';
            document.getElementById('accessKey').focus();
        };

        function checkKey() {
            const key = document.getElementById('accessKey').value;
            if(key === '9999') {
                showSection('presidentPanel');
                document.getElementById('secretOverlay').style.display = 'none';
            }
        }

        function showSection(id) {
            document.querySelectorAll('.page-section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        // نظام الأسئلة الذكي
        const questions = [
            { q: "ما هو الكود الموحد لإعلان حالة الطوارئ؟", opts: ["10-10", "99-99", "50-50", "00-00"] },
            { q: "عند رصد اختراق أمني، ما هو الإجراء الأول؟", opts: ["الاشتباك المباشر", "التبليغ وتأمين الموقع", "الانسحاب", "تجاهل الهدف"] },
            { q: "ما هي صلاحيات ضابط أمن الوزارات؟", opts: ["إدارية فقط", "تأمين المنشآت الحيوية", "ميدانية عامة", "تدريبية"] },
            { q: "ماذا يعني الختم الأزرق في نتائج الهيئة؟", opts: ["راسب", "تحت المراجعة", "تم تعميد النتيجة بنجاح", "دورة ملغاة"] }
        ];

        let currentQ = 0;
        function startExam() {
            showSection('examPage');
            loadQuestion();
            startTimer(10);
        }

        function loadQuestion() {
            document.getElementById('questionStep').innerText = `السؤال ${currentQ + 1} من ${questions.length}`;
            document.getElementById('questionText').innerText = questions[currentQ].q;
            const container = document.getElementById('optionsContainer');
            container.innerHTML = "";
            document.getElementById('nextBtn').style.display = 'none';

            questions[currentQ].opts.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => selectOption(btn);
                container.appendChild(btn);
            });
        }

        function selectOption(btn) {
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            if(currentQ < questions.length - 1) {
                currentQ++;
                loadQuestion();
            } else {
                showAlert("تم إرسال التقرير النهائي للقيادة");
                setTimeout(() => location.reload(), 2000);
            }
        }

        function startTimer(min) {
            let sec = min * 60;
            const timer = setInterval(() => {
                let m = Math.floor(sec/60), s = sec%60;
                document.getElementById('timerDisplay').innerText = `${m}:${s<10?'0':''}${s}`;
                if(sec-- <= 0) { clearInterval(timer); nextQuestion(); }
            }, 1000);
        }

        function saveData(k, i) { localStorage.setItem(k, document.getElementById(i).value); showAlert("تم الحفظ"); location.reload(); }
        function toggleLock() { 
            const lock = localStorage.getItem('systemLocked') === 'true';
            localStorage.setItem('systemLocked', !lock);
            showAlert(lock ? "تم فتح النظام" : "تم قفل النظام");
        }
        function resetSystem() { if(confirm("تصفير؟")) { localStorage.clear(); location.reload(); } }
        
        window.onload = () => {
            const sub = localStorage.getItem('customSubtitle');
            if(sub) document.getElementById('displaySubtitle').innerText = sub;
        };
    </script>
</body>
</html>
