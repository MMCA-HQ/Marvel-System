<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هيئة الدورات العسكرية | دولة مارفل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAALZ-v8wA_5mjUVSqW1uLXMwMkskpDaGM",
            authDomain: "mmca-authority.firebaseapp.com",
            databaseURL: "https://mmca-authority-default-rtdb.firebaseio.com",
            projectId: "mmca-authority",
            storageBucket: "mmca-authority.firebasestorage.app",
            messagingSenderId: "105278081999",
            appId: "1:105278081999:web:b24e7fc8aba9aaf76ca0ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const CLIENT_ID = "1470440081612603465";
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        let currentUser = null;
        let examQuestions = [];
        let currentQIndex = 0;
        let examTimer;

        // نظام اللوقات المركزي (12 قناة)
        window.logAction = (ch, msg, target = null, extra = null) => {
            push(ref(db, `logs/L${ch}`), {
                t: new Date().toLocaleString('ar-EG'),
                id: currentUser?.id || "نظام آلي",
                m: msg,
                tgt: target,
                ex: extra
            });
        };

        window.switchView = (id) => {
            document.querySelectorAll('.view').forEach(v => {
                v.classList.remove('active');
                setTimeout(() => v.classList.add('hidden'), 300);
            });
            setTimeout(() => {
                const target = document.getElementById(id);
                target.classList.remove('hidden');
                setTimeout(() => target.classList.add('active'), 50);
            }, 350);
            if(id === 'view-admin') initAdmin();
            if(id === 'view-marvel') initMarvel();
        };

        window.loginDiscord = () => {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
        };

        window.onload = async () => {
            const params = new URLSearchParams(window.location.hash.slice(1));
            const token = params.get("access_token");
            if (token) {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } });
                currentUser = await res.json();
                window.history.replaceState({}, "", window.location.pathname);
                document.getElementById('display-id').value = currentUser.id;
                switchView('view-requirements');
                logAction(1, "تم تسجيل دخول مستخدم جديد");
            } else { switchView('view-auth'); }
            
            onValue(ref(db, 'course_info'), s => { 
                if(s.exists()) document.querySelectorAll('.c-name-display').forEach(el => el.innerText = s.val().name);
            });
        };

        // إدارة المتطلبات والاختبار
        window.submitReqs = () => {
            const name = document.getElementById('req-name').value;
            const code = document.getElementById('req-code').value;
            if(!name || !code) return alert("يرجى إدخال كافة البيانات العسكرية الرسمية");
            set(ref(db, `applications/${currentUser.id}`), { name, code, rank: document.getElementById('req-rank').value, status: 'pending' });
            logAction(1, `أرسل طلب التحاق: ${name}`);
            switchView('view-waiting');
            onValue(ref(db, `applications/${currentUser.id}`), (s) => { if (s.val()?.status === 'accepted') startExam(); });
        };

        async function startExam() {
            const snap = await get(ref(db, 'questions_bank'));
            examQuestions = []; snap.forEach(q => examQuestions.push({id: q.key, ...q.val()}));
            currentQIndex = 0; switchView('view-exam');
            renderQ();
        }

        function renderQ() {
            const q = examQuestions[currentQIndex];
            const container = document.getElementById('q-content');
            let timeLeft = q.duration || 30;
            let html = `<div class="progress-bar"><div class="fill" style="width:${((currentQIndex+1)/examQuestions.length)*100}%"></div></div>`;
            html += `<h2 class="q-title">${q.text}</h2>`;
            if(q.type === 'choice') {
                q.options.forEach(o => { html += `<div class="option-card" onclick="setAns(this, '${o}')">${o}</div>`; });
            } else { html += `<textarea id="essay-ans" class="mil-input" style="height:120px" placeholder="اكتب الإجابة الفنية..."></textarea>`; }
            container.innerHTML = html;
            document.getElementById('timer-val').innerText = timeLeft;
            clearInterval(examTimer);
            examTimer = setInterval(() => {
                timeLeft--; document.getElementById('timer-val').innerText = timeLeft;
                if(timeLeft <= 0) nextQ();
            }, 1000);
        }

        window.setAns = (el, v) => {
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected'); window.tempAns = v;
        };

        window.nextQ = () => {
            const q = examQuestions[currentQIndex];
            const ans = q.type === 'choice' ? window.tempAns : document.getElementById('essay-ans').value;
            set(ref(db, `results/${currentUser.id}/${q.id}`), { q: q.text, a: ans || "تجاوز الوقت", score: "", user: document.getElementById('req-name').value });
            currentQIndex++;
            if(currentQIndex < examQuestions.length) renderQ();
            else { clearInterval(examTimer); switchView('view-finish'); }
        };

        window.openGate = (k) => {
            const p = prompt("أدخل رمز التحقق:");
            if(k === 'R' && p === '0101') switchView('view-admin');
            else if(k === 'M' && p === '9999') switchView('view-marvel');
        };

        function initAdmin() {
            onValue(ref(db, 'applications'), s => {
                const b = document.getElementById('adm-list'); b.innerHTML = "";
                s.forEach(a => b.innerHTML += `<tr><td>${a.val().name}</td><td>${a.val().status}</td><td><button onclick="upSt('${a.key}','accepted')">قبول</button> <button class="btn-danger" onclick="upSt('${a.key}','rejected')">رفض</button></td></tr>`);
            });
        }

        function initMarvel() {
            const names = ["","دخول","مشرفين","تلاعب","قبول","أسئلة","إجابات","درجات","نتائج","بوابات","أقسام","إضافات","أخطاء"];
            for(let i=1; i<=12; i++){
                onValue(ref(db, `logs/L${i}`), s => {
                    const box = document.getElementById(`log-ch-${i}`); box.innerHTML = "";
                    s.forEach(l => box.innerHTML = `<div class="log-item">${l.val().m}</div>` + box.innerHTML);
                });
                document.getElementById(`lt-${i}`).innerText = names[i];
            }
        }
        window.upSt = (id, s) => update(ref(db, `applications/${id}`), {status: s});
        window.addQ = () => {
            const t = prompt("نص السؤال:");
            push(ref(db, 'questions_bank'), { text: t, type: 'essay', duration: 30 });
        };
    </script>
    <style>
        :root { --accent: #a371f7; --bg: #050508; --panel: rgba(15, 15, 25, 0.9); --border: rgba(163, 113, 247, 0.2); }
        body { background: var(--bg); color: #e1e1e1; font-family: 'Cairo', sans-serif; margin: 0; direction: rtl; }
        .view { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; transition: 0.5s; opacity: 0; }
        .view.active { opacity: 1; }
        .hidden { display: none !important; }
        
        .hero-card { background: var(--panel); backdrop-filter: blur(15px); border: 1px solid var(--border); padding: 40px; border-radius: 30px; text-align: center; max-width: 480px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.7); position: relative; }
        
        /* تنسيق الصورة الشخصية للشعار */
        .main-logo { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 3px solid var(--accent); box-shadow: 0 0 25px rgba(163, 113, 247, 0.4); }

        .dept-tag { background: rgba(163, 113, 247, 0.1); padding: 6px 20px; border-radius: 50px; font-size: 0.8rem; color: var(--accent); display: inline-block; margin-bottom: 10px; border: 1px solid var(--border); }
        .main-title { font-weight: 900; font-size: 2.2rem; margin: 0; color: #fff; line-height: 1.2; }
        .sub-title { font-weight: 300; font-size: 1.1rem; margin-top: 10px; opacity: 0.8; }

        .mil-input { width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: #fff; border-radius: 12px; margin: 10px 0; font-family: 'Cairo'; outline: none; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; border: none; background: var(--accent); color: #fff; font-weight: 900; border-radius: 12px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(163, 113, 247, 0.4); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid var(--border); padding: 12px; text-align: center; font-size: 0.8rem; }
        .log-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .log-box { height: 100px; overflow-y: auto; background: #000; padding: 5px; font-size: 9px; color: #888; border: 1px solid #222; }
        .footer { position: fixed; bottom: 15px; width: 100%; text-align: center; font-size: 0.7rem; opacity: 0.3; }
        .gate { cursor: help; }
    </style>
</head>
<body>

    <div id="view-auth" class="view">
        <div class="hero-card">
            <img src="https://i.ibb.co/37a0df/image.jpg" class="main-logo" alt="Marvel Logo">
            <br>
            <div class="dept-tag">هيئة الدورات العسكرية</div>
            <h1 class="main-title">دولة مارفل</h1>
            <div class="sub-title">دورة عسكرية متخصصة</div>
            <button class="btn-main" onclick="loginDiscord()">التحقق عبر ديسكورد</button>
        </div>
    </div>

    <div id="view-requirements" class="view hidden">
        <div class="hero-card">
            <h3>استمارة البيانات</h3>
            <input type="text" id="display-id" class="mil-input" readonly>
            <input type="text" id="req-name" class="mil-input" placeholder="الاسم العسكري الرباعي">
            <input type="text" id="req-code" class="mil-input" placeholder="الكود العسكري">
            <input type="text" id="req-rank" class="mil-input" placeholder="الرتبة">
            <button class="btn-main" onclick="submitReqs()">تقديم الطلب</button>
        </div>
    </div>

    <div id="view-waiting" class="view hidden">
        <div class="hero-card">
            <h2 style="color: var(--accent);">بانتظار الموافقة...</h2>
            <p>يتم الآن مراجعة بياناتك من قبل هيئة الدورات.</p>
        </div>
    </div>

    <div id="view-exam" class="view hidden">
        <div class="hero-card" style="max-width: 700px;">
            <div style="font-size: 2rem; color: #ff4757; font-weight: 900;" id="timer-val">30</div>
            <div id="q-content"></div>
            <button class="btn-main" onclick="nextQ()">تأكيد الإجابة</button>
        </div>
    </div>

    <div id="view-finish" class="view hidden">
        <div class="hero-card">
            <h2 style="color: var(--accent);">انتهت المهمة</h2>
            <p>تم رفع تقريرك بنجاح.</p>
            <button class="btn-main" onclick="location.reload()">خروج</button>
        </div>
    </div>

    <div id="view-admin" class="view hidden">
        <div class="hero-card" style="max-width: 800px;">
            <h3>إدارة المتقدمين</h3>
            <table><thead><tr><th>الاسم</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody id="adm-list"></tbody></table>
            <button class="btn-main" onclick="location.reload()" style="background:#222;">خروج</button>
        </div>
    </div>

    <div id="view-marvel" class="view hidden">
        <div class="hero-card" style="max-width: 1000px;">
            <h2>قيادة مارفل العليا</h2>
            <button class="btn-main" onclick="addQ()">+ إضافة سؤال</button>
            <div class="log-grid">
                <script>for(let i=1; i<=12; i++){ document.write(`<div><small id="lt-${i}"></small><div id="log-ch-${i}" class="log-box"></div></div>`); }</script>
            </div>
            <button class="btn-main" onclick="location.reload()" style="background:#ff4757;">إغلاق</button>
        </div>
    </div>

    <div class="footer">
        حقوق <span class="gate" onclick="openGate('R')">هيئة الدورات</span> | دولة <span class="gate" onclick="openGate('M')">مارفل</span> 2026
    </div>

</body>
</html>
