<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هيئة الدورات العسكرية | MARVEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // إعدادات قاعدة البيانات (تأكد من صحتها في Firebase Console)
        const firebaseConfig = {
            apiKey: "AIzaSyAALZ-v8wA_5mjUVSqW1uLXMwMkskpDaGM",
            authDomain: "mmca-authority.firebaseapp.com",
            databaseURL: "https://mmca-authority-default-rtdb.firebaseio.com",
            projectId: "mmca-authority",
            storageBucket: "mmca-authority.firebasestorage.app",
            messagingSenderId: "105278081999",
            appId: "1:105278081999:web:b24e7fc8aba9aaf76ca0ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const CLIENT_ID = "1470440081612603465";
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        let currentUser = null;
        let questions = [];
        let currentIdx = 0;

        // --- محرك النظام ---
        window.logAction = (ch, msg) => {
            push(ref(db, `logs/L${ch}`), {
                time: new Date().toLocaleString('ar-EG'),
                user: currentUser?.username || "غير معروف",
                action: msg
            });
        };

        window.switchView = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'view-admin') loadAdmin();
            if(id === 'view-marvel') loadMarvel();
        };

        // --- نظام ديسكورد ---
        window.loginDiscord = () => {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
        };

        window.onload = async () => {
            const params = new URLSearchParams(window.location.hash.slice(1));
            const token = params.get("access_token");
            if (token) {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } });
                currentUser = await res.json();
                window.history.replaceState({}, "", window.location.pathname);
                switchView('view-apply');
            } else { switchView('view-auth'); }
            
            onValue(ref(db, 'course_settings'), s => {
                if(s.exists()) document.getElementById('course-name-header').innerText = s.val().name;
            });
        };

        // --- تقديم الطلبات ---
        window.submitApplication = () => {
            const name = document.getElementById('in-name').value;
            if(!name) return alert("أدخل اسمك العسكري!");
            const data = { name, discordId: currentUser.id, status: 'pending', time: new Date().toLocaleTimeString() };
            set(ref(db, `apps/${currentUser.id}`), data);
            logAction(1, `قدم طلباً جديداً باسم: ${name}`);
            switchView('view-wait');
            onValue(ref(db, `apps/${currentUser.id}`), s => { if(s.val()?.status === 'accepted') startExam(); });
        };

        // --- نظام الاختبار ---
        async function startExam() {
            const s = await get(ref(db, 'bank'));
            questions = []; s.forEach(q => questions.push({id: q.key, ...q.val()}));
            currentIdx = 0; switchView('view-exam');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            const cont = document.getElementById('exam-cont');
            cont.innerHTML = `<h3>${q.text}</h3>`;
            if(q.type === 'choice') {
                q.opts.forEach(o => cont.innerHTML += `<div class="opt-card" onclick="window.selAns='${o}'">${o}</div>`);
            } else {
                cont.innerHTML += `<textarea id="essay" class="mil-input" placeholder="اكتب إجابتك هنا..."></textarea>`;
            }
        }

        window.nextQ = () => {
            const q = questions[currentIdx];
            const ans = q.type === 'choice' ? window.selAns : document.getElementById('essay').value;
            set(ref(db, `results/${currentUser.id}/${q.id}`), {
                student: document.getElementById('in-name').value,
                q: q.text, a: ans || "لم يجب", score: "لم ترصد"
            });
            currentIdx++;
            if(currentIdx < questions.length) renderQuestion();
            else switchView('view-done');
        };

        // --- الإدارة (حقوق) ---
        function loadAdmin() {
            onValue(ref(db, 'apps'), s => {
                const b = document.getElementById('list-apps'); b.innerHTML = "";
                s.forEach(a => b.innerHTML += `<tr><td>${a.val().name}</td><td><button onclick="updateApp('${a.key}','accepted')">قبول</button></td></tr>`);
            });
            onValue(ref(db, 'results'), s => {
                const b = document.getElementById('list-grades'); b.innerHTML = "";
                s.forEach(u => u.forEach(q => {
                    b.innerHTML += `<tr><td>${q.val().student}</td><td>${q.val().a}</td><td>${q.val().score}</td><td>
                        <button onclick="grade('${u.key}','${q.key}',1)">1</button>
                        <button class="btn-red" onclick="grade('${u.key}','${q.key}',0)">0</button>
                    </td></tr>`;
                }));
            });
        }
        window.updateApp = (id, st) => update(ref(db, `apps/${id}`), {status: st});
        window.grade = (uid, qid, sc) => update(ref(db, `results/${uid}/${qid}`), {score: sc});

        // --- مركز القيادة (مارفل) - حيث يتم الحذف النهائي ---
        function loadMarvel() {
            onValue(ref(db, 'results'), s => {
                const b = document.getElementById('marvel-results'); b.innerHTML = "";
                s.forEach(u => u.forEach(q => {
                    b.innerHTML += `<tr><td>${q.val().student}</td><td>${q.val().score}</td><td><button class="btn-red" onclick="finalDel('results/${u.key}/${q.key}')">حذف نهائي</button></td></tr>`;
                }));
            });
            // تحميل اللوقات الـ 12
            for(let i=1; i<=12; i++) {
                onValue(ref(db, `logs/L${i}`), s => {
                    const box = document.getElementById(`log-box-${i}`); box.innerHTML = "";
                    s.forEach(l => box.innerHTML = `<div>${l.val().time}: ${l.val().action}</div>` + box.innerHTML);
                });
            }
        }
        window.finalDel = (path) => { if(confirm("حذف السجل نهائياً؟")) remove(ref(db, path)); };
        window.addQ = () => {
            const t = prompt("السؤال:");
            push(ref(db, 'bank'), { text: t, type: 'essay' });
        };

        window.openAccess = (key) => {
            const p = prompt("كلمة السر:");
            if(key === 'R' && p === '0101') switchView('view-admin');
            if(key === 'M' && p === '9999') switchView('view-marvel');
        };
    </script>

    <style>
        :root { --p: #9d50bb; --bg: #050508; --c: #0d0d16; --b: rgba(157, 80, 187, 0.3); }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; direction: rtl; }
        .view { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
        
        .card { background: var(--c); border: 1px solid var(--b); padding: 40px; border-radius: 25px; text-align: center; max-width: 500px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .tag { background: rgba(157, 80, 187, 0.1); color: var(--p); padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; border: 1px solid var(--b); margin-bottom: 15px; display: inline-block; }
        
        h1 { font-family: 'Orbitron', 'Cairo'; font-weight: 900; margin: 0; font-size: 2.2rem; }
        .mil-input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--b); color: #fff; border-radius: 12px; margin: 15px 0; font-family: 'Cairo'; box-sizing: border-box; }
        
        button { background: var(--p); color: #fff; border: none; padding: 15px 25px; border-radius: 10px; cursor: pointer; font-weight: 900; transition: 0.3s; width: 100%; margin-top: 10px; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-red { background: #ff4757; }

        table { width: 100%; margin-top: 20px; font-size: 0.8rem; border-collapse: collapse; }
        th, td { border: 1px solid var(--b); padding: 10px; text-align: center; }

        .log-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .log-box { height: 100px; overflow-y: auto; background: #000; font-size: 9px; padding: 5px; text-align: right; border: 1px solid #222; color: #aaa; }
    </style>
</head>
<body>

    <div id="view-auth" class="view">
        <div class="card">
            <div class="tag">هيئة الدورات العسكرية</div>
            <h1>دولة مارفل</h1>
            <p id="course-name-header">تحميل اسم الدورة...</p>
            <button onclick="loginDiscord()">التحقق بالهوية الرقمية</button>
        </div>
    </div>

    <div id="view-apply" class="view hidden">
        <div class="card">
            <h3>استمارة الالتحاق</h3>
            <input type="text" id="in-name" class="mil-input" placeholder="الاسم العسكري الرباعي">
            <button onclick="submitApplication()">تقديم الطلب</button>
        </div>
    </div>

    <div id="view-wait" class="view hidden"><div class="card"><h2>قيد مراجعة الأهلية...</h2></div></div>

    <div id="view-exam" class="view hidden">
        <div class="card" style="max-width: 700px;">
            <div id="exam-cont"></div>
            <button onclick="nextQ()">تأكيد وإرسال</button>
        </div>
    </div>

    <div id="view-done" class="view hidden"><div class="card"><h2>تم إنهاء المهمة بنجاح</h2><button onclick="location.reload()">خروج</button></div></div>

    <div id="view-admin" class="view hidden">
        <div class="card" style="max-width: 900px;">
            <h3>طلبات القبول</h3>
            <table><thead><tr><th>المتقدم</th><th>الإجراء</th></tr></thead><tbody id="list-apps"></tbody></table>
            <h3>التصحيح (البيانات لا تحذف من هنا)</h3>
            <table><thead><tr><th>الطالب</th><th>الإجابة</th><th>الدرجة</th><th>رصد</th></tr></thead><tbody id="list-grades"></tbody></table>
            <button onclick="location.reload()" style="background:#222">خروج</button>
        </div>
    </div>

    <div id="view-marvel" class="view hidden">
        <div class="card" style="max-width: 1000px;">
            <h2>مركز القيادة والسيطرة</h2>
            <button onclick="addQ()">+ إضافة سؤال</button>
            <h3>سجل النتائج (الحذف النهائي من هنا)</h3>
            <table><thead><tr><th>الطالب</th><th>الدرجة</th><th>إجراء</th></tr></thead><tbody id="marvel-results"></tbody></table>
            <div class="log-container">
                <script>for(let i=1; i<=12; i++) document.write(`<div><small>قناة ${i}</small><div id="log-box-${i}" class="log-box"></div></div>`);</script>
            </div>
            <button onclick="location.reload()" class="btn-red">إغلاق النظام</button>
        </div>
    </div>

    <div style="position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 10px; opacity: 0.2;">
        <span onclick="openAccess('R')">حقوق</span> | <span onclick="openAccess('M')">مارفل</span>
    </div>

</body>
</html>
