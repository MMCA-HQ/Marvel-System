<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة هيئة تنظيم الدورات | دولة مارفل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00d4ff; --g: #ffcc00; --r: #ff4b2b; --bg: #050507; --c: #0d0d12; }
        body { 
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif; 
            background: linear-gradient(rgba(5, 5, 7, 0.9), rgba(5, 5, 7, 0.95)), url('https://images.unsplash.com/photo-1579567761406-4684ee0c75b6?q=80&w=2000');
            background-size: cover; background-attachment: fixed; color: white; min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; overflow-x: hidden; transition: 0.3s;
        }
        body.alert-border { border: 10px solid var(--r); box-shadow: inset 0 0 50px var(--r); }
        .container { background: var(--c); padding: 40px; border-radius: 25px; border: 1px solid rgba(0, 212, 255, 0.1); box-shadow: 0 0 60px rgba(0,0,0,0.8); width: 480px; text-align: center; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-family: 'Cairo'; transition: 0.3s; background: #5865F2; color: white; margin-top: 15px; }
        .btn-gold { background: var(--g); color: black; }
        .btn-red { background: var(--r); color: white; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #222; background: #000; color: white; box-sizing: border-box; text-align: right; font-family: 'Cairo'; }
        #timer { position: fixed; top: 25px; left: 25px; color: var(--p); font-weight: 900; font-size: 1.5rem; text-shadow: 0 0 10px var(--p); }
        #mAlert { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--c); border: 1px solid var(--p); padding: 12px 30px; border-radius: 10px; z-index: 9999; box-shadow: 0 0 20px var(--p); }
        .q-card { background: #111; padding: 20px; border-radius: 15px; border-right: 5px solid var(--p); text-align: right; margin-top: 20px; }
        .opt-btn { display: block; width: 100%; background: #000; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #222; color: white; text-align: right; cursor: pointer; }
        .opt-btn.active { border-color: var(--p); background: rgba(0, 212, 255, 0.05); }
        footer { position: fixed; bottom: 15px; width: 100%; text-align: center; opacity: 0.1; transition: 0.5s; cursor: pointer; }
        footer:hover { opacity: 1; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="mAlert">نظام مارفل السيادي</div>

    <div id="login-page" class="container">
        <h1 style="color: var(--p); margin-bottom: 5px;">دولة مارفل</h1>
        <p>مركز العمليات والتدريب</p>
        <button class="btn" onclick="showPage('waiting-page')">تسجيل الدخول عبر Discord</button>
    </div>

    <div id="waiting-page" class="container hidden">
        <h2>حالة الهوية الرقمية</h2>
        <p>مرحباً بك.. طلبك الآن <br><span style="color:var(--g); font-weight:bold;">قيد المراجعة الأمنية</span></p>
        <div style="width:30px; height:30px; border:3px solid #333; border-top-color:var(--p); border-radius:50%; animation:spin 1s linear infinite; margin:20px auto;"></div>
        <button class="btn" style="background:#1a1a1a; font-size:12px;" onclick="showPage('data-page')">قبول الطالب (للمشرف فقط)</button>
    </div>

    <div id="data-page" class="container hidden">
        <h2>تعبئة السجل العسكري</h2>
        <form onsubmit="event.preventDefault(); startExam();">
            <input type="text" placeholder="الاسم كامل" required>
            <input type="text" placeholder="الكود العسكري" required>
            <input type="number" placeholder="العمر" required>
            <select required>
                <option value="">اختر الرتبة</option>
                <option>ملازم</option>
                <option>ملازم أول</option>
                <option>نقيب</option>
                <option>رائد</option>
            </select>
            <button type="submit" class="btn btn-gold">بدء حقن المهام</button>
        </form>
    </div>

    <div id="exam-page" class="container hidden" style="width: 650px;">
        <div id="timer">20:00</div>
        <div id="qContent"></div>
        <button id="nextBtn" class="btn btn-gold" style="display:none;" onclick="nextStep()">المهمة التالية</button>
    </div>

    <div id="admin-page" class="container hidden">
        <h2 style="color: var(--g);">مركز تحكم الرئيس</h2>
        <select id="qType" onchange="toggleQType()">
            <option value="multi">اختيار من متعدد</option>
            <option value="text">مقالي (كتابة)</option>
        </select>
        <input type="text" id="qTitle" placeholder="نص السؤال">
        <div id="multiInputs">
            <input type="text" id="o1" placeholder="الخيار 1 (الصحيح)">
            <input type="text" id="o2" placeholder="الخيار 2">
            <input type="text" id="o3" placeholder="الخيار 3">
        </div>
        <button class="btn btn-gold" onclick="saveQuestion()">حفظ وحقن السؤال</button>
        <button class="btn btn-red" onclick="localStorage.clear(); location.reload();">تصفير المنظومة</button>
        <button class="btn" style="background:#222;" onclick="location.reload()">خروج</button>
    </div>

    <div id="gateway" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:10000; justify-content:center; align-items:center;">
        <input type="password" id="adminCode" placeholder="••••" maxlength="4" oninput="checkAdmin()" style="font-size:4rem; width:250px; background:none; border:none; border-bottom:2px solid #333; color:var(--p); letter-spacing:20px;">
    </div>

    <footer onclick="openGateway()">© هيئة تنظيم الدورات العسكرية - دولة مارفل</footer>

    <script>
        let bank = JSON.parse(localStorage.getItem('marvel_db')) || [];
        let cur = 0;
        let timeLeft = 1200;

        // حماية الدستور
        document.onkeydown = (e) => { if (e.keyCode == 123 || (e.ctrlKey && e.keyCode == 85)) return false; };
        window.onblur = () => document.body.classList.add('alert-border');
        window.onfocus = () => document.body.classList.remove('alert-border');

        function showPage(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function openGateway() { document.getElementById('gateway').style.display='flex'; document.getElementById('adminCode').focus(); }

        function checkAdmin() {
            if(document.getElementById('adminCode').value === '9999') {
                document.getElementById('gateway').style.display='none';
                showPage('admin-page');
            }
        }

        function toggleQType() { document.getElementById('multiInputs').style.display = document.getElementById('qType').value === 'text' ? 'none' : 'block'; }

        function saveQuestion() {
            const q = {
                t: document.getElementById('qTitle').value,
                ty: document.getElementById('qType').value,
                opts: [document.getElementById('o1').value, document.getElementById('o2').value, document.getElementById('o3').value]
            };
            bank.push(q);
            localStorage.setItem('marvel_db', JSON.stringify(bank));
            alert("تم حقن السؤال");
            document.getElementById('qTitle').value = "";
        }

        function startExam() {
            if(bank.length === 0) return alert("لا توجد أسئلة في البنك!");
            showPage('exam-page');
            renderQ();
            setInterval(() => {
                let m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
                timeLeft--;
            }, 1000);
        }

        function renderQ() {
            const q = bank[cur];
            let html = `<div class="q-card"><h3>${q.t}</h3>`;
            if(q.ty === 'multi') {
                q.opts.filter(o => o!=="").sort(()=>Math.random()-0.5).forEach(o => {
                    html += `<div class="opt-btn" onclick="selectOpt(this)">${o}</div>`;
                });
            } else {
                html += `<textarea placeholder="اكتب إجابتك هنا..." oninput="document.getElementById('nextBtn').style.display='block'"></textarea>`;
            }
            document.getElementById('qContent').innerHTML = html + `</div>`;
            document.getElementById('nextBtn').style.display = 'none';
        }

        function selectOpt(el) {
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextStep() {
            if(cur < bank.length - 1) { cur++; renderQ(); }
            else { alert("تم إنهاء الاختبار بنجاح"); location.reload(); }
        }
    </script>
    <style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
