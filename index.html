<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة هيئة تنظيم الدورات | دولة مارفل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #00d4ff; --gold: #ffcc00; --red-alert: #ff4b2b;
            --bg-dark: #050507; --card-bg: #0d0d12; --member-blue: #00a8ff;
        }

        body {
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark); color: white; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050507 100%);
            overflow-x: hidden; transition: border 0.3s ease;
        }

        /* العين الحمراء (كاشف الخروج) */
        body.alert-border { border: 8px solid var(--red-alert); box-shadow: inset 0 0 50px var(--red-alert); }

        .page-section { display: none; width: 100%; max-width: 1000px; padding: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* الصفحة الرئيسية */
        #loginPage { display: block; text-align: center; max-width: 420px; }
        .system-container {
            background: var(--card-bg); padding: 50px; border-radius: 25px;
            border: 1px solid rgba(0, 212, 255, 0.15); box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        /* لوحات التحكم */
        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; }
        h1 { font-size: 2.5rem; margin: 10px 0; background: linear-gradient(to bottom, #fff, #555); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h3 { color: var(--gold); }

        /* نظام الاختبار */
        #examPage { max-width: 800px; }
        .question-card { background: #161625; padding: 25px; border-radius: 15px; border-right: 5px solid var(--primary-glow); margin-bottom: 20px; text-align: right; }
        .option-label { display: block; background: #000; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; cursor: pointer; }
        
        /* التوقيت والمسودة */
        #timerDisplay { position: fixed; top: 15px; left: 20px; font-weight: 900; color: var(--primary-glow); font-size: 1.5rem; z-index: 4000; }
        #militaryScratchpad { position: fixed; left: 20px; bottom: 20px; width: 250px; background: #000; border: 1px solid #444; border-radius: 10px; z-index: 2000; }
        #scratchpadArea { width: 100%; height: 150px; background: #000; color: #0f0; border: none; padding: 10px; box-sizing: border-box; display: none; }

        input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; text-align: center; font-family: 'Cairo'; }
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; }

        #secretOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 5000; justify-content: center; align-items: center; }
        footer { position: fixed; bottom: 20px; width: 100%; text-align: center; display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loginPage" class="page-section">
        <div class="system-container">
            <div style="color: var(--primary-glow); font-weight: bold;">هيئة تنظيم الدورات العسكرية</div>
            <h1>دولة مارفل</h1>
            <div id="displaySubtitle" style="color: #888; margin-bottom: 30px;">النظام الموحد للاختبارات الإلكترونية</div>
            <button class="btn-action" style="background: #5865F2; color: white;" onclick="startVerification()">التحقق من الهوية الرقمية</button>
        </div>
    </div>

    <div id="presidentPanel" class="page-section">
        <h2 style="border-bottom: 2px solid var(--gold);">مركز القيادة والسيطرة (الرئيس)</h2>
        <div class="control-grid">
            <div class="card">
                <h3>⚙️ إعدادات الواجهة</h3>
                <input type="text" id="newSubtitle" placeholder="تغيير مسمى الدورة">
                <button class="btn-action" style="background: var(--gold);" onclick="saveData('customSubtitle', 'newSubtitle')">تحديث</button>
            </div>
            <div class="card">
                <h3>🚫 سيادة النظام</h3>
                <button class="btn-action" style="background: var(--red-alert); color: white;" onclick="toggleLock()">قفل / فتح المنظومة</button>
                <button class="btn-action" style="background: #444; color: white; margin-top: 10px;" onclick="resetSystem()">تصفير شامل</button>
            </div>
        </div>
        <button class="btn-action" style="margin-top: 20px; background: #222; color: white;" onclick="location.reload()">تسجيل خروج</button>
    </div>

    <div id="memberPanel" class="page-section">
        <h2 style="border-bottom: 2px solid var(--member-blue);">بوابة أعضاء الهيئة</h2>
        <div class="control-grid">
            <div class="card"><h3>📋 مراجعة الطلبات</h3><button class="btn-action" style="background: var(--member-blue); color: white;">فتح القائمة</button></div>
            <div class="card"><h3>📝 مراقبة الطلاب</h3><button class="btn-action" style="background: #222; color: white;">المراقب الحي</button></div>
        </div>
        <button class="btn-action" style="margin-top: 20px; background: #222; color: white;" onclick="location.reload()">تسجيل خروج</button>
    </div>

    <div id="examPage" class="page-section">
        <div id="timerDisplay">00:00</div>
        <div id="questionsContainer"></div>
        <button class="btn-action" style="background: var(--primary-glow); color: #000; margin-top: 20px;" onclick="submitExam()">إرسال التقرير النهائي</button>
    </div>

    <div id="militaryScratchpad" style="display:none;">
        <div style="padding:10px; color:var(--gold); text-align:center; cursor:pointer;" onclick="document.getElementById('scratchpadArea').toggleAttribute('style')">📓 المسودة العسكرية</div>
        <textarea id="scratchpadArea" style="display:none;"></textarea>
    </div>

    <div id="secretOverlay">
        <div style="text-align: center;">
            <div style="color: var(--primary-glow); margin-bottom: 10px;">نظام الصلاحيات</div>
            <input type="password" id="accessKey" maxlength="4" placeholder="••••" oninput="checkKey()" style="font-size: 2rem; letter-spacing: 10px;">
        </div>
    </div>

    <footer id="mainFooter">
        <div style="font-size: 0.8rem; color: #222;" id="adminTrigger">هيئة تنظيم الدورات العسكرية</div>
    </footer>

    <script>
        // منع النسخ والزر الأيمن
        document.onkeydown = (e) => { if (e.keyCode == 123 || (e.ctrlKey && (e.keyCode == 67 || e.keyCode == 85))) return false; };
        document.body.oncontextmenu = () => false;

        // العين الحمراء
        window.onblur = () => document.body.classList.add('alert-border');
        window.onfocus = () => document.body.classList.remove('alert-border');

        function startVerification() {
            if(localStorage.getItem('systemLocked') === 'true') return alert("المنظومة مغلقة حالياً.");
            document.getElementById('mainFooter').style.display = 'block';
            alert("تم التحقق. للدخول للإدارة، انقر مرتين على نص الهيئة في الأسفل.");
            // لبدء الاختبار (للطالب)
            setTimeout(startExam, 1500);
        }

        document.getElementById('adminTrigger').ondblclick = () => {
            document.getElementById('secretOverlay').style.display = 'flex';
            document.getElementById('accessKey').focus();
        };

        function checkKey() {
            const key = document.getElementById('accessKey').value;
            if(key === '9999') showSection('presidentPanel');
            else if(key === '0101') showSection('memberPanel');
        }

        function showSection(id) {
            document.querySelectorAll('.page-section').forEach(s => s.style.display = 'none');
            document.getElementById('secretOverlay').style.display = 'none';
            document.getElementById(id).style.display = 'block';
            document.getElementById('mainFooter').style.display = 'none';
        }

        // نظام الاختبار
        const questions = [
            { q: "ما هو الإجراء العسكري الأول عند رصد خطر؟", opts: ["التبليغ", "الهروب", "الاشتباك"], ans: 0 },
            { q: "من يملك صلاحية تعميد النتائج؟", opts: ["العضو", "الرئيس", "الطالب"], ans: 1 }
        ];

        function startExam() {
            showSection('examPage');
            document.getElementById('militaryScratchpad').style.display = 'block';
            let container = document.getElementById('questionsContainer');
            container.innerHTML = "";
            questions.sort(() => Math.random() - 0.5).forEach((item, i) => {
                container.innerHTML += `<div class="question-card"><h3>س${i+1}: ${item.q}</h3>${item.opts.map((o, index) => `<label class="option-label"><input type="radio" name="q${i}">${o}</label>`).join('')}</div>`;
            });
            let sec = 600; 
            let timer = setInterval(() => {
                let m = Math.floor(sec/60), s = sec%60;
                document.getElementById('timerDisplay').innerText = `${m}:${s<10?'0':''}${s}`;
                if(sec-- <= 0) { clearInterval(timer); submitExam(); }
            }, 1000);
        }

        function submitExam() { alert("تم إرسال التقرير."); location.reload(); }
        function saveData(k, i) { localStorage.setItem(k, document.getElementById(i).value); location.reload(); }
        function toggleLock() { localStorage.setItem('systemLocked', localStorage.getItem('systemLocked')!=='true'); alert("تم تغيير حالة النظام"); }
        function resetSystem() { if(confirm("تصفير؟")) { localStorage.clear(); location.reload(); } }
        
        window.onload = () => {
            const sub = localStorage.getItem('customSubtitle');
            if(sub) document.getElementById('displaySubtitle').innerText = sub;
        };
    </script>
</body>
</html>
