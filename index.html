<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة هيئة تنظيم الدورات | دولة مارفل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #00d4ff;
            --army-indigo: #1a1a2e;
            --bg-dark: #050507;
            --card-bg: #0d0d12;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050507 100%);
        }

        body::before {
            content: "MARVEL STATE SYSTEM 0101 9999";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.03; font-size: 10px; line-height: 15px; word-break: break-all;
            z-index: -1; pointer-events: none;
        }

        .system-container {
            width: 420px;
            background: var(--card-bg);
            padding: 50px;
            border-radius: 25px;
            border: 1px solid rgba(0, 212, 255, 0.15);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        /* تنسيق النصوص العلوية الجديد */
        .header-top {
            font-size: 0.9rem;
            color: var(--primary-glow);
            letter-spacing: 1px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        h1 {
            font-size: 3rem; font-weight: 900; margin: 0px 0;
            background: linear-gradient(to bottom, #ffffff 40%, #555 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .system-subtitle {
            color: #888;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .btn-verify {
            width: 100%; padding: 18px;
            background: linear-gradient(45deg, #5865F2, #404eed);
            border: none; border-radius: 12px;
            color: white; font-weight: 900; font-size: 1.1rem;
            cursor: pointer; transition: 0.4s;
            font-family: 'Cairo';
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }

        .btn-verify:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(88, 101, 242, 0.5); }

        #secretOverlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            z-index: 1000; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }

        .secret-box {
            background: #111; padding: 40px; border-radius: 20px;
            border: 1px solid var(--primary-glow); text-align: center; width: 320px;
        }

        .secret-box input {
            width: 100%; padding: 15px; margin-top: 20px;
            border-radius: 10px; border: 1px solid #333;
            background: #000; color: var(--primary-glow);
            text-align: center; font-size: 1.5rem; letter-spacing: 5px; outline: none;
        }

        footer {
            position: absolute; bottom: 30px; text-align: center;
            width: 100%; display: none; /* تظهر فقط بعد التحقق */
        }

        .rights-text {
            font-size: 0.8rem; color: #444; cursor: default;
            user-select: none; transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="system-container">
        <div class="header-top">هيئة تنظيم الدورات العسكرية</div>
        <h1>دولة مارفل</h1>
        <div class="system-subtitle">النظام الموحد للاختبارات الإلكترونية</div>
        
        <p style="color: #444; font-size: 0.85rem; margin-bottom: 20px;">يرجى إثبات الهوية للوصول للمنظومة</p>
        
        <button class="btn-verify" id="verifyBtn" onclick="startVerification()">التحقق من الهوية الرقمية</button>
    </div>

    <div id="secretOverlay">
        <div class="secret-box">
            <div style="color: var(--primary-glow); font-weight: bold; font-size: 1.1rem;">نظام الصلاحيات العليا</div>
            <input type="password" id="accessKey" maxlength="4" placeholder="••••" oninput="validateKey()">
        </div>
    </div>

    <footer id="mainFooter">
        <div style="color: #222; font-size: 0.7rem; margin-bottom: 5px;">حقوق - دولة مارفل</div>
        <div class="rights-text" id="adminTrigger">هيئة تنظيم الدورات العسكرية</div>
    </footer>

    <script>
        function startVerification() {
            document.getElementById('verifyBtn').innerText = "تم التحقق بنجاح ✓";
            document.getElementById('verifyBtn').style.background = "#2ecc71";
            document.getElementById('verifyBtn').disabled = true;

            // تفعيل التمويه الإداري في الأسفل فقط
            document.getElementById('mainFooter').style.display = 'block';
        }

        document.getElementById('adminTrigger').ondblclick = function() {
            document.getElementById('secretOverlay').style.display = 'flex';
            document.getElementById('accessKey').focus();
        };

        function validateKey() {
            const key = document.getElementById('accessKey').value;
            if (key === '9999') {
                window.location.href = "president_panel.html";
            } else if (key === '0101') {
                window.location.href = "members_panel.html";
            }
        }

        window.onclick = function(event) {
            let overlay = document.getElementById('secretOverlay');
            if (event.target == overlay) {
                overlay.style.display = "none";
                document.getElementById('accessKey').value = "";
            }
        }
    </script>
</body>
</html>
