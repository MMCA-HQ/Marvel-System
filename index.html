<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة مارفل العسكرية المتكاملة 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAALZ-v8wA_5mjUVSqW1uLXMwMkskpDaGM",
            authDomain: "mmca-authority.firebaseapp.com",
            databaseURL: "https://mmca-authority-default-rtdb.firebaseio.com",
            projectId: "mmca-authority",
            storageBucket: "mmca-authority.firebasestorage.app",
            messagingSenderId: "105278081999",
            appId: "1:105278081999:web:b24e7fc8aba9aaf76ca0ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const CLIENT_ID = "1470440081612603465";
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        let currentUser = null;
        let examQuestions = [];
        let currentQIndex = 0;
        let examTimer = null;

        // --- نظام اللوقات المطور (منع الـ undefined) ---
        window.logAction = (channel, details, targetId = "-", extra = "-") => {
            if (!currentUser) return;
            push(ref(db, `logs/L${channel}`), {
                time: new Date().toLocaleString('ar-EG'),
                adminId: currentUser.id || "غير معروف",
                studentId: targetId || "-",
                details: details || "-",
                extraInfo: extra || "-"
            });
        };

        window.switchView = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'view-logs') initCentralPanel();
        };

        window.loginDiscord = () => {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
        };

        window.onload = async () => {
            const params = new URLSearchParams(window.location.hash.slice(1));
            const token = params.get("access_token");
            if (token) {
                try {
                    const res = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } });
                    currentUser = await res.json();
                    if (currentUser.id) {
                        window.history.replaceState({}, "", window.location.pathname);
                        document.getElementById('display-id').value = currentUser.id;
                        switchView('view-requirements');
                        logAction(1, "سجل دخول للنظام", currentUser.id, "متصل");
                    }
                } catch (e) { switchView('view-auth'); }
            } else { switchView('view-auth'); }
            
            onValue(ref(db, 'course_info'), s => { 
                if(s.exists()) document.querySelectorAll('.c-name-display').forEach(el => el.innerText = s.val().name);
            });
        };

        // --- نظام الاختبار (إصلاح الانتقال) ---
        window.submitReqs = () => {
            const name = document.getElementById('req-name').value;
            const code = document.getElementById('req-code').value;
            if (!name || !code) return alert("أكمل البيانات!");
            
            const data = { name, code, rank: document.getElementById('req-rank').value, age: document.getElementById('req-age').value, dId: currentUser.id, status: 'pending' };
            set(ref(db, `applications/${currentUser.id}`), data);
            logAction(4, "أرسل متطلباته", currentUser.id, name);
            switchView('view-waiting');
            
            onValue(ref(db, `applications/${currentUser.id}`), (snap) => { 
                if (snap.val()?.status === 'accepted') startTheExam(); 
            });
        };

        async function startTheExam() {
            const snap = await get(ref(db, 'questions_bank'));
            examQuestions = []; 
            snap.forEach(q => examQuestions.push({id: q.key, ...q.val()}));
            if (examQuestions.length === 0) return alert("لا توجد أسئلة!");
            currentQIndex = 0;
            switchView('view-exam');
            renderQuestion();
        }

        function renderQuestion() {
            clearInterval(examTimer);
            if (currentQIndex >= examQuestions.length) { 
                switchView('view-congrats'); 
                return; 
            }
            
            const q = examQuestions[currentQIndex];
            const container = document.getElementById('q-container');
            let timeLeft = parseInt(q.duration) || 30;
            
            let html = `<h2>السؤال ${currentQIndex + 1}: ${q.text}</h2><p>الدرجة: ${q.points}</p>`;
            if (q.type === 'choice') {
                q.options.forEach(opt => { html += `<label class="opt-card"><input type="radio" name="ans" value="${opt}"> ${opt}</label>`; });
            } else { html += `<textarea id="essay-ans" class="inp" placeholder="اكتب إجابتك..."></textarea>`; }
            
            container.innerHTML = html;
            document.getElementById('timer-display').innerText = timeLeft;

            examTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-display').innerText = timeLeft;
                if (timeLeft <= 0) { clearInterval(examTimer); nextQuestion(); }
            }, 1000);
        }

        window.nextQuestion = () => {
            const q = examQuestions[currentQIndex];
            const userAns = q.type === 'choice' ? document.querySelector('input[name="ans"]:checked')?.value : document.getElementById('essay-ans')?.value;
            
            set(ref(db, `results/${currentUser.id}/${q.id}`), { 
                q_text: q.text, answer: userAns || "انتهى الوقت", score: "", max_score: q.points, user: document.getElementById('req-name').value 
            });

            logAction(6, "أجاب على سؤال", currentUser.id, userAns || "تجاوز الوقت");
            currentQIndex++;
            renderQuestion();
        };

        // --- اللوحة المركزية ---
        window.accessGate = (p) => { if(p === '9999') switchView('view-logs'); else alert("خطأ!"); };

        function initCentralPanel() {
            // الطلبات
            onValue(ref(db, 'applications'), s => {
                const b = document.getElementById('admin-req-list'); b.innerHTML = "";
                s.forEach(c => {
                    const d = c.val();
                    b.innerHTML += `<tr><td>${d.name}</td><td>${d.dId}</td><td>${d.status}</td><td>
                        <button onclick="updApp('${c.key}','accepted')">قبول</button>
                        <button onclick="updApp('${c.key}','rejected')">رفض</button>
                    </td><td><button style="background:red" onclick="delData('applications/${c.key}')">حذف</button></td></tr>`;
                });
            });
            // الإجابات
            onValue(ref(db, 'results'), s => {
                const b = document.getElementById('correction-list'); b.innerHTML = "";
                s.forEach(u => { u.forEach(q => {
                    const r = q.val();
                    b.innerHTML += `<tr><td>${r.user}</td><td>${u.key}</td><td>${r.q_text}</td><td>${r.answer}</td><td>
                        <input type="number" id="grd-${u.key}-${q.key}" placeholder="${r.max_score}" style="width:40px">
                        <button onclick="setGrd('${u.key}','${q.key}', document.getElementById('grd-${u.key}-${q.key}').value)">رصد</button>
                    </td><td><button style="background:red" onclick="delData('results/${u.key}/${q.key}')">حذف</button></td></tr>`;
                });});
            });
            // اللوقات
            for(let i=1; i<=12; i++) {
                onValue(ref(db, `logs/L${i}`), snap => {
                    const box = document.getElementById(`log-box-${i}`); box.innerHTML = "";
                    snap.forEach(l => { 
                        const v = l.val();
                        box.innerHTML = `<div class="log-entry">${v.time} | المشرف: ${v.adminId} | الطالب: ${v.studentId} | ${v.details} | ${v.extraInfo}</div>` + box.innerHTML; 
                    });
                });
            }
        }

        window.updApp = (id, st) => { update(ref(db, `applications/${id}`), {status: st}); logAction(4, "تحديث حالة", id, st); };
        window.setGrd = (u, q, g) => { update(ref(db, `results/${u}/${q}`), {score: g}); logAction(7, "تصحيح إجابة", u, g); };
        window.delData = (p) => { if(confirm("حذف؟")) remove(ref(db, p)); };
        
        window.addQ = () => {
            const txt = document.getElementById('q-txt').value;
            const type = document.getElementById('q-type').value;
            const pts = document.getElementById('q-pts').value;
            const dur = document.getElementById('q-dur').value;
            let opts = [];
            if(type === 'choice') opts = document.getElementById('q-opts').value.split("،");
            
            push(ref(db, 'questions_bank'), { text: txt, type: type, duration: dur, points: pts, options: opts });
            logAction(11, "إضافة سؤال", "-", txt);
            alert("تم!");
        };
    </script>
    <style>
        :root { --discord: #5865f2; --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; direction: rtl; margin: 0; }
        .view { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 8px; width: 100%; max-width: 1000px; }
        .inp { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 4px; margin: 5px 0; font-family: 'Cairo'; }
        button { background: var(--discord); color: #fff; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; margin: 2px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid var(--border); padding: 8px; text-align: center; font-size: 12px; }
        .log-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .log-box { height: 150px; overflow-y: auto; background: #000; color: #39ff14; font-family: monospace; font-size: 10px; padding: 5px; border: 1px solid #333; }
        .timer-box { font-size: 30px; color: #f85149; text-align: center; margin-bottom: 15px; }
        .opt-card { display: block; background: #21262d; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="view-auth" class="view">
        <div class="card" style="max-width:350px; text-align:center;">
            <h1>دولة مارفل</h1>
            <button onclick="loginDiscord()" style="width:100%">دخول بالديسكورد</button>
            <p style="font-size:10px; margin-top:10px; cursor:pointer" onclick="accessGate(prompt('الرمز:'))">الإدارة</p>
        </div>
    </div>

    <div id="view-requirements" class="view hidden">
        <div class="card" style="max-width: 400px;">
            <h2>بيانات الدورة</h2>
            <input type="text" id="display-id" class="inp" readonly>
            <input type="text" id="req-name" class="inp" placeholder="الاسم">
            <input type="text" id="req-code" class="inp" placeholder="الكود">
            <input type="text" id="req-rank" class="inp" placeholder="الرتبة">
            <input type="number" id="req-age" class="inp" placeholder="العمر">
            <button onclick="submitReqs()" style="width:100%">إرسال</button>
        </div>
    </div>

    <div id="view-waiting" class="view hidden">
        <div class="card" style="text-align:center;"><h2>بانتظار الموافقة...</h2></div>
    </div>

    <div id="view-exam" class="view hidden">
        <div class="card" style="max-width: 500px;">
            <div class="timer-box" id="timer-display">--</div>
            <div id="q-container"></div>
            <button onclick="nextQuestion()" style="width:100%; margin-top:20px;">تأكيد</button>
        </div>
    </div>

    <div id="view-congrats" class="view hidden">
        <div class="card" style="text-align:center;"><h2>تم الإرسال بنجاح</h2><button onclick="location.reload()">خروج</button></div>
    </div>

    <div id="view-logs" class="view hidden">
        <div class="card">
            <h3>إدارة الأسئلة</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                <input type="text" id="q-txt" class="inp" placeholder="السؤال">
                <select id="q-type" class="inp"><option value="essay">مقالي</option><option value="choice">اختياري</option></select>
                <input type="number" id="q-pts" class="inp" placeholder="الدرجة">
                <input type="number" id="q-dur" class="inp" placeholder="الوقت (ثواني)">
            </div>
            <input type="text" id="q-opts" class="inp" placeholder="الخيارات (افصل بـ ،)">
            <button onclick="addQ()" style="width:100%; background:green">إضافة</button>

            <h3>الطلبات والإجابات</h3>
            <table><thead><tr><th>الاسم</th><th>الأيدي</th><th>الحالة</th><th>إجراء</th><th>حذف</th></tr></thead><tbody id="admin-req-list"></tbody></table>
            <table><thead><tr><th>الاسم</th><th>الأيدي</th><th>السؤال</th><th>الإجابة</th><th>الدرجة</th><th>حذف</th></tr></thead><tbody id="correction-list"></tbody></table>

            <h3>سجلات النظام</h3>
            <div class="log-grid">
                <div><small>1. الدخول</small><div id="log-box-1" class="log-box"></div></div>
                <div><small>4. القبول</small><div id="log-box-4" class="log-box"></div></div>
                <div><small>6. الإجابات</small><div id="log-box-6" class="log-box"></div></div>
                <div><small>7. التصحيح</small><div id="log-box-7" class="log-box"></div></div>
                <div><small>11. الإضافات</small><div id="log-box-11" class="log-box"></div></div>
            </div>
            <button onclick="location.reload()" style="margin-top:10px;">إغلاق</button>
        </div>
    </div>

</body>
</html>
