<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>هيئة تنظيم الدورات العسكرية | النظام الموحد</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <style>
        /* التنسيق البصري العسكري (حسب الصور) */
        :root { --m-green: #2d5a27; --m-dark: #050505; --m-gold: #d4af37; --m-red: #ff0000; }
        body { background-color: var(--m-dark); color: white; font-family: 'Tahoma', sans-serif; margin: 0; overflow: hidden; user-select: none; }
        
        /* بوابة التحقق والتمويه */
        #gateway { position: fixed; inset: 0; background: radial-gradient(circle, #0d1a0b 0%, #000 100%); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .panel { border: 2px solid var(--m-green); padding: 40px; text-align: center; background: rgba(0,0,0,0.9); box-shadow: 0 0 30px var(--m-green); }
        .btn-auth { background: #5865F2; color: white; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; font-size: 18px; }

        /* النظام الرئيسي */
        #main-system { display: none; padding: 20px; height: 100vh; overflow-y: auto; }
        .section { display: none; }
        
        /* الرقابة الصارمة (14 لوق) */
        .logs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; margin-top: 20px; }
        .log-box { background: #111; border: 1px solid var(--m-green); padding: 10px; height: 150px; overflow-y: auto; font-size: 11px; font-family: monospace; }
        .log-box h4 { color: var(--m-gold); margin-top: 0; border-bottom: 1px solid #222; padding-bottom: 5px; }

        /* الحماية والعين الحمراء */
        .red-eye { animation: red-flash 0.5s infinite; }
        @keyframes red-flash { 0% { box-shadow: inset 0 0 50px red; } 100% { box-shadow: inset 0 0 150px red; } }
        
        /* شريط الإنجاز والمسودة */
        .progress-container { width: 100%; height: 10px; background: #222; margin: 20px 0; }
        #progress-fill { height: 100%; background: var(--m-green); width: 0%; transition: 0.5s; }
        .notes-area { position: fixed; left: 10px; top: 100px; width: 180px; height: 300px; background: rgba(0,0,0,0.8); border: 1px solid var(--m-green); padding: 5px; }

        footer { position: fixed; bottom: 0; width: 100%; text-align: center; padding: 10px; background: rgba(0,0,0,0.8); cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="gateway">
        <div class="panel">
            <h1>هيئة تنظيم الدورات العسكرية</h1>
            <p>دولة مارفل | النظام الموحد للاختبارات</p>
            <button class="btn-auth" onclick="startAuth()">التحقق من الهوية الرقمية</button>
        </div>
    </div>

    <main id="main-system">
        <div id="page-president" class="section">
            <h2 style="color:var(--m-gold)">لوحة السيادة الإدارية (الرئيس)</h2>
            <div class="controls">
                <button onclick="globalLock()" style="background:red; color:white;">قفل النظام الشامل</button>
                <button onclick="systemReset()">تصفير المنظومة</button>
                <button onclick="addQuestion()">إضافة سؤال جديد</button>
            </div>
            <h3>الرقابة الصارمة (Logs)</h3>
            <div class="logs-grid" id="logs-container"></div>
        </div>

        <div id="page-members" class="section">
            <h2>بوابة الأعضاء (هيئة الإشراف)</h2>
            <div class="member-tools">
                <div class="log-box" style="height:300px; width:100%;">
                    <h4>مراقب الجلسات الحية</h4>
                    <div id="live-users"></div>
                </div>
                <button onclick="approveAll()">قبول الكل</button> <button onclick="rejectAll()">رفض الكل</button>
            </div>
        </div>

        <div id="page-exam" class="section">
            <div style="text-align:center;">
                <h3>هيئة تنظيم الدورات العسكرية</h3>
                <h4>دولة مارفل</h4>
                <p>الدورة الحالية: <span id="course-name">نظام العمليات</span></p>
            </div>
            <div class="progress-container"><div id="progress-fill"></div></div>
            <div id="exam-questions" class="panel">
                </div>
            <div class="notes-area">
                <small>المسودة العسكرية</small>
                <textarea style="width:100%; height:90%; background:black; color:lime; border:none;"></textarea>
            </div>
        </div>
    </main>

    <footer id="main-footer" style="opacity:0" ondblclick="secretEntry()">
        هيئة تنظيم الدورات العسكرية © 2026
    </footer>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAALZ-v8wA_5mjUVSqW1uLXMwMkskpDaGM",
            authDomain: "mmca-authority.firebaseapp.com",
            projectId: "mmca-authority",
            databaseURL: "https://mmca-authority-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // إعدادات ديسكورد
        const CLIENT_ID = '1470440081612603465';
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        // دالة التحقق
        function startAuth() {
            const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
            window.location.href = url;
        }

        window.onload = () => {
            const hash = window.location.hash.slice(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');

            if (token) {
                fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } })
                .then(r => r.json())
                .then(user => {
                    saveLog("لوق دخول", `المستخدم ${user.username} (ID: ${user.id}) قام بالتحقق`);
                    openAccessControl();
                });
            }
        };

        function openAccessControl() {
            const code = prompt("أدخل كود الوصول العسكري الخاص بك:");
            document.getElementById('gateway').style.display = 'none';
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('main-footer').style.opacity = '1';

            if (code === "9999") {
                showPage('page-president');
                initLogs();
            } else if (code === "0101") {
                showPage('page-members');
            } else {
                showPage('page-exam');
                enableProtection();
            }
        }

        function showPage(id) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        // إنشاء الـ 14 لوق للرئيس
        function initLogs() {
            const names = [
                "لوق الدخول والخروج من الاختبار", "لوق دخول وخروج الأعضاء", "لوق دخول وخروج الرئيس",
                "لوق قبول ورفض الطلبات", "لوق بدء وانتهاء الاختبار", "لوق اجابات الطلاب",
                "لوق تصحيح الأعضاء للاجابات", "لوق الغش اثناء الاختبار", "لوق التلاعب",
                "لوق محاولة الدخول الى الصفحات الاخرى", "لوق التعديلات على الاقسام",
                "لوق الاضافات", "لوق الحذف", "لوق الطوارئ"
            ];
            const container = document.getElementById('logs-container');
            container.innerHTML = names.map((n, i) => `<div class="log-box"><h4>${n}</h4><div id="l-${i}"></div></div>`).join('');
        }

        function saveLog(type, msg) {
            db.collection("system_logs").add({ type: type, message: msg, time: new Date().toLocaleString() });
        }

        // نظام الحماية (العين الحمراء)
        function enableProtection() {
            document.addEventListener('keydown', e => {
                if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) {
                    triggerEye();
                    return false;
                }
            });
            window.onblur = () => triggerEye();
        }

        function triggerEye() {
            document.body.classList.add('red-eye');
            saveLog("لوق الغش", "محاولة تلاعب أو مغادرة الصفحة");
            setTimeout(() => document.body.classList.remove('red-eye'), 2000);
        }

        function secretEntry() {
            alert("تم تفعيل المدخل السري للرئيس");
        }
    </script>
</body>
</html>
