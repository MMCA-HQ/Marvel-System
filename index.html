<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARVEL AUTHORITY | DISCORD INTEGRATION</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAALZ-v8wA_5mjUVSqW1uLXMwMkskpDaGM",
            authDomain: "mmca-authority.firebaseapp.com",
            databaseURL: "https://mmca-authority-default-rtdb.firebaseio.com",
            projectId: "mmca-authority",
            storageBucket: "mmca-authority.firebasestorage.app",
            messagingSenderId: "105278081999",
            appId: "1:105278081999:web:b24e7fc8aba9aaf76ca0ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let userSession = null;

        // المواضيع العسكرية الافتراضية
        const defaultTopics = [
            "قانون الانضباط العسكري وقيم الجندية",
            "فنون التمويه والتخفي في البيئات المختلفة",
            "تكتيكات المداهمة والاقتحام الحضري",
            "إدارة الأزمات والتعامل مع الرهائن",
            "أمن المنشآت الحيوية والحراسات",
            "مهارات الاستطلاع وجمع المعلومات الميدانية",
            "الإسعافات الأولية في أرض المعركة",
            "التعامل مع المتفجرات والأجسام المشبوهة",
            "سلاسل الإمداد والدعم اللوجستي العسكري",
            "القيادة العسكرية واتخاذ القرار تحت الضغط"
        ];

        // --- نظام الدخول عبر الديسكورد ---
        window.startDiscordAuth = () => {
            const dName = document.getElementById('d-name').value;
            const dId = document.getElementById('d-id').value;
            if(!dName || !dId) return alert("⚠️ أدخل بيانات الديسكورد أولاً!");

            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('auth-loading').classList.remove('hidden');

            setTimeout(() => {
                document.getElementById('auth-loading').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
                document.getElementById('user-welcome').innerText = dName;
            }, 1500);
        };

        window.finalLogin = (role) => {
            const dName = document.getElementById('d-name').value;
            const dId = document.getElementById('d-id').value;
            const pass = document.getElementById('admin-pass').value;

            if(role !== 'trainee' && pass !== '2121') return alert("❌ رمز التحقق للرتبة خاطئ!");

            userSession = { name: dName, id: dId, role: role };

            if(role === 'trainee') {
                showView('view-trainee');
                set(ref(db, 'requests/' + dId), { name: dName, id: dId, status: 'waiting' });
                listenToStatus(dId);
            } else if(role === 'admin') {
                showView('view-admin');
                initAdminPanel();
            } else {
                showView('view-logs');
                initLogsPanel();
            }
            writeLog(role === 'trainee' ? 3 : 5, `تم التحقق: ${dName} (${role})`);
        };

        // --- منطق المتدرب ---
        function listenToStatus(uid) {
            onValue(ref(db, 'requests/' + uid), (snap) => {
                if(snap.val()?.status === 'accepted') {
                    document.getElementById('trainee-wait').classList.add('hidden');
                    document.getElementById('trainee-exam').classList.remove('hidden');
                    loadExam();
                }
            });
        }

        function loadExam() {
            onValue(ref(db, 'config/topics'), (snap) => {
                const topics = snap.val() || defaultTopics;
                const container = document.getElementById('exam-list');
                container.innerHTML = "";
                topics.forEach((t, i) => {
                    container.innerHTML += `<div class="q-card"><h4>${i+1}. ${t}</h4><textarea placeholder="الإجابة..."></textarea></div>`;
                });
            });
        }

        // --- منطق المشرف ---
        function initAdminPanel() {
            onValue(ref(db, 'requests'), (snap) => {
                const list = document.getElementById('admin-req-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const r = c.val();
                    if(r.status === 'waiting') {
                        list.innerHTML += `<div class="row"><span>${r.name}</span>
                        <div><button class="b-s" onclick="updateReq('${r.id}','accepted')">قبول</button>
                        <button class="b-d" onclick="updateReq('${r.id}','rejected')">رفض</button></div></div>`;
                    }
                });
            });
        }

        window.updateReq = (id, s) => { update(ref(db, 'requests/'+id), {status:s}); writeLog(1, `قرار ${s} للمتدرب ${id}`); };

        // --- منطق اللوقات وتعديل الأسئلة ---
        function initLogsPanel() {
            onValue(ref(db, 'config/topics'), (snap) => {
                const topics = snap.val() || defaultTopics;
                const editor = document.getElementById('topics-editor');
                editor.innerHTML = "<h3>تعديل مواضيع الاختبار:</h3>";
                topics.forEach((t, i) => {
                    editor.innerHTML += `<input type="text" value="${t}" id="edit-t-${i}" class="edit-in"> <button onclick="saveTopic(${i})" class="b-s">حفظ</button><br>`;
                });
            });
            [1, 3, 5, 10].forEach(n => {
                onValue(ref(db, `logs/L${n}`), (snap) => {
                    const b = document.getElementById(`L${n}`); b.innerHTML = "";
                    snap.forEach(l => b.innerHTML = `<div>[${l.val().time}] ${l.val().msg}</div>` + b.innerHTML);
                });
            });
        }

        window.saveTopic = (i) => {
            const val = document.getElementById(`edit-t-${i}`).value;
            update(ref(db, 'config/topics'), { [i]: val });
            writeLog(10, `تم تعديل الموضوع رقم ${i+1}`);
            alert("تم التحديث.");
        };

        function writeLog(n, m) {
            push(ref(db, `logs/L${n}`), { msg: m, time: new Date().toLocaleTimeString('ar-EG') });
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>

    <style>
        :root { --discord: #5865F2; --bg: #23272A; --card: #2C2F33; --green: #43b581; --red: #f04747; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; direction: rtl; margin: 0; text-align: center; }
        .view { max-width: 600px; margin: 50px auto; background: var(--card); padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #23272A; border: 1px solid #444; color: white; border-radius: 5px; }
        .btn { background: var(--discord); color: white; border: none; padding: 15px; width: 90%; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .q-card { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: right; border-right: 4px solid var(--discord); }
        textarea { width: 100%; height: 80px; background: #23272A; border: 1px solid #444; color: white; border-radius: 5px; margin-top: 10px; }
        .row { background: #23272A; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .b-s { background: var(--green); border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .b-d { background: var(--red); border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-right: 5px; }
        .log-box { height: 120px; overflow-y: auto; background: #000; color: #00ff41; font-family: monospace; font-size: 11px; padding: 10px; border-radius: 5px; text-align: left; }
        .edit-in { width: 70% !important; margin: 5px 0; }
    </style>
</head>
<body>

    <div id="view-auth" class="view">
        <div id="step-1">
            <h2 style="color: var(--discord);">Discord Authentication</h2>
            <input type="text" id="d-name" placeholder="اسم المستخدم (Discord Username)">
            <input type="text" id="d-id" placeholder="معرف المستخدم (Discord ID)">
            <button class="btn" onclick="startDiscordAuth()">Login with Discord</button>
        </div>

        <div id="auth-loading" class="hidden">
            <p>جاري التحقق من الهوية عبر خوادم Discord...</p>
        </div>

        <div id="step-2" class="hidden">
            <h3>أهلاً، <span id="user-welcome" style="color:var(--discord)"></span></h3>
            <button class="btn" style="background:var(--green)" onclick="finalLogin('trainee')">دخول كمتدرب</button>
            <hr style="border:0.5px solid #444; margin:20px 0;">
            <input type="password" id="admin-pass" placeholder="كود التحقق الخاص بالرتبة">
            <button class="btn" onclick="finalLogin('admin')">دخول مشرف</button>
            <button class="btn" style="background:#747f8d" onclick="finalLogin('logs')">دخول المراجعة</button>
        </div>
    </div>

    <div id="view-trainee" class="view hidden">
        <div id="trainee-wait">
            <h3 style="color:#faa61a">قيد الانتظار...</h3>
            <p>يرجى انتظار موافقة القيادة لتفعيل المواضيع العشرة.</p>
        </div>
        <div id="trainee-exam" class="hidden">
            <h2 style="color:var(--green)">الاختبار العسكري الشامل</h2>
            <div id="exam-list"></div>
            <button class="btn" onclick="alert('تم التسليم للسحابة')">إرسال التقرير النهائي</button>
        </div>
    </div>

    <div id="view-admin" class="view hidden">
        <h2>إدارة طلبات الدخول</h2>
        <div id="admin-req-list"></div>
    </div>

    <div id="view-logs" class="view hidden" style="max-width: 800px;">
        <div id="topics-editor"></div>
        <hr style="margin:20px 0; border:0.5px solid #444;">
        <h3>سجلات النظام (Logs)</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><h4>القبول والرفض</h4><div class="log-box" id="L1"></div></div>
            <div><h4>تعديل المواضيع</h4><div class="log-box" id="L10"></div></div>
            <div><h4>دخول المستخدمين</h4><div class="log-box" id="L3"></div></div>
            <div><h4>دخول المشرفين</h4><div class="log-box" id="L5"></div></div>
        </div>
    </div>

</body>
</html>
