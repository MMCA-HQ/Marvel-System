<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هيئة تنظيم الدورات العسكرية | دولة مارفل</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body class="military-theme" oncontextmenu="return false" onkeydown="return disableF12(event)">

    <div id="auth-gateway" class="gateway-overlay">
        <div class="glass-panel">
            <h1 class="glitch-text">النظام الموحد للاختبارات الإلكترونية</h1>
            <p class="sub-title">دولة مارفل - الهيئة الإدارية</p>
            <button id="discord-login-btn" onclick="startDiscordAuth()">التحقق من الهوية الرقمية</button>
        </div>
    </div>

    <main id="main-system" style="display: none;">
        
        <section id="commander-section" class="system-page" style="display: none;">
            <header class="page-header">
                <h2>لوحة السيادة الإدارية (الرئيس)</h2>
                <div class="status-bar">الحالة: متصل | الرتبة: قيادة عليا</div>
            </header>
            <div class="admin-controls">
                <button class="panic-btn" onclick="globalLock()">قفل النظام الشامل</button>
                <button class="reset-btn" onclick="factoryReset()">تصفير المنظومة</button>
            </div>
            <div id="logs-container" class="logs-grid"></div>
        </section>

        <section id="staff-section" class="system-page" style="display: none;">
            <h2>بوابة هيئة الإشراف (الأعضاء)</h2>
            <div class="live-monitor">
                <h3>مراقب الجلسات الحية</h3>
                <ul id="students-list"></ul>
            </div>
        </section>

        <section id="exam-section" class="system-page" style="display: none;">
            <div class="exam-header">
                <div class="military-id">هيئة تنظيم الدورات العسكرية</div>
                <div id="exam-timer" class="timer">00:00</div>
            </div>
            <div id="progress-bar-container">
                <div id="progress-fill"></div>
            </div>
            <div id="question-area">
                </div>
            <aside class="military-notes">
                <h4>المسودة العسكرية</h4>
                <textarea placeholder="اكتب ملاحظاتك هنا..."></textarea>
            </aside>
        </section>

    </main>

    <footer id="secret-footer" style="opacity: 0;">
        <p>هيئة تنظيم الدورات العسكرية © 2026</p>
        <div id="secret-trigger" ondblclick="activateSecretAdmin()"></div>
    </footer>

    <audio id="radio-noise" src="assets/radio_chatter.mp3" loop></audio>
    <audio id="alert-sound" src="assets/alert.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
