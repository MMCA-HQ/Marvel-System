<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة هيئة تنظيم الدورات | دولة مارفل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff; --gold: #ffcc00; --red: #ff4b2b;
            --bg: #050507; --card: #0d0d12;
        }

        body {
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
            background-color: var(--bg); color: white; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050507 100%);
            overflow: hidden; transition: 0.3s;
        }

        /* العين الحمراء - كاشف الخروج */
        body.alert-border { border: 10px solid var(--red); box-shadow: inset 0 0 50px var(--red); }

        .section { display: none; width: 100%; max-width: 500px; padding: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* التنبيهات السيادية */
        #marvelAlert {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(13, 13, 18, 0.98); border: 1px solid var(--primary);
            padding: 15px 40px; border-radius: 12px; z-index: 9999;
            box-shadow: 0 0 20px var(--primary); text-align: center; font-weight: bold;
        }

        /* واجهة الدخول */
        #entry { display: block; text-align: center; }
        .marvel-box {
            background: var(--card); padding: 40px; border-radius: 30px;
            border: 1px solid rgba(0, 212, 255, 0.1); box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }

        /* نظام الأسئلة (سؤال تلو الآخر) */
        .q-box { background: #111; padding: 25px; border-radius: 20px; border-right: 4px solid var(--primary); margin: 20px 0; }
        .opt-btn {
            display: block; width: 100%; padding: 14px; margin: 10px 0;
            background: #000; border: 1px solid #333; color: white;
            border-radius: 10px; cursor: pointer; transition: 0.3s; font-family: 'Cairo';
        }
        .opt-btn:hover, .opt-btn.active { border-color: var(--primary); background: rgba(0,212,255,0.05); }

        /* المدخل السري */
        #adminGateway { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 8000; justify-content: center; align-items: center; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; text-align: center; font-family: 'Cairo'; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-family: 'Cairo'; transition: 0.3s; }

        footer { position: fixed; bottom: 20px; width: 100%; text-align: center; display: none; }
        .rights { font-size: 0.8rem; color: #111; cursor: default; user-select: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="marvelAlert">نظام مارفل السيادي</div>

    <div id="entry" class="section">
        <div class="marvel-box">
            <div style="color: var(--primary); font-weight: bold; font-size: 0.9rem;">هيئة تنظيم الدورات العسكرية</div>
            <h1 style="font-size: 3rem; margin: 5px 0;">دولة مارفل</h1>
            <div id="subText" style="color: #555; font-weight: bold; margin-bottom: 30px;">النظام الموحد للاختبارات الإلكترونية</div>
            <button class="btn" style="background: #5865F2; color: white;" onclick="verifyUser()">التحقق من الهوية الرقمية</button>
        </div>
    </div>

    <div id="exam" class="section">
        <div id="timer" style="position:fixed; top:20px; left:20px; font-weight:900; color:var(--primary); font-size:1.4rem;">10:00</div>
        <div id="step" style="font-size: 0.8rem; color: #444;">المهمة 1 من 4</div>
        <div class="q-box">
            <h3 id="qText">جاري تحميل البيانات...</h3>
            <div id="opts"></div>
        </div>
        <button id="next" class="btn" style="background: var(--primary); color: #000; display: none;" onclick="goNext()">المهمة التالية</button>
    </div>

    <div id="adminPanel" class="section" style="max-width: 800px;">
        <h2 style="border-bottom: 2px solid var(--gold); padding-bottom: 10px;">مركز السيطرة السيادي</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="marvel-box" style="padding: 20px;">
                <h3>⚙️ التحكم</h3>
                <input type="text" id="newTitle" placeholder="تغيير مسمى الدورة">
                <button class="btn" style="background: var(--gold);" onclick="setVal('title', 'newTitle')">تحديث المسمى</button>
            </div>
            <div class="marvel-box" style="padding: 20px;">
                <h3>🚫 السيادة</h3>
                <button class="btn" style="background: var(--red); color: white;" onclick="toggleLock()">قفل / فتح النظام</button>
                <button class="btn" style="background: #333; color: white; margin-top: 10px;" onclick="resetAll()">تصفير النظام</button>
            </div>
        </div>
    </div>

    <div id="adminGateway">
        <div style="text-align: center;">
            <div style="color: var(--primary); margin-bottom: 10px;">أدخل كود التفويض</div>
            <input type="password" id="pass" maxlength="4" oninput="checkPass()" style="font-size: 2.5rem; letter-spacing: 15px; width: 250px;">
        </div>
    </div>

    <footer id="footer">
        <div class="rights" id="trigger">هيئة تنظيم الدورات العسكرية</div>
    </footer>

    <script>
        // درع الحماية
        document.onkeydown = (e) => { if (e.keyCode == 123 || (e.ctrlKey && (e.keyCode == 67 || e.keyCode == 85))) return false; };
        window.onblur = () => document.body.classList.add('alert-border');
        window.onfocus = () => document.body.classList.remove('alert-border');

        // نظام التنبيهات
        function showMsg(m) {
            const a = document.getElementById('marvelAlert');
            a.innerText = m; a.style.display = 'block';
            setTimeout(() => a.style.display = 'none', 3000);
        }

        // بدء التحقق
        function verifyUser() {
            if(localStorage.getItem('lock') === 'true') return showMsg("المنظومة مغلقة بأمر الإدارة");
            document.getElementById('footer').style.display = 'block';
            showMsg("تم التحقق بنجاح. النظام جاهز.");
            setTimeout(startTest, 2000);
        }

        // الدخول السري
        document.getElementById('trigger').ondblclick = () => {
            document.getElementById('adminGateway').style.display = 'flex';
            document.getElementById('pass').focus();
        };

        function checkPass() {
            const p = document.getElementById('pass').value;
            if(p === '9999') {
                document.getElementById('adminGateway').style.display = 'none';
                document.getElementById('entry').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            }
        }

        // نظام الاختبار
        const data = [
            {q: "ما هو الإجراء الأول عند رصد متسلل؟", o: ["الاشتباك", "التبليغ والتأمين", "الانسحاب"]},
            {q: "من يملك حق تعميد النتائج النهائية؟", o: ["الأعضاء", "الرئيس فقط", "المتقدم"]},
            {q: "ما هو تصنيف دولة مارفل؟", o: ["دولة عسكرية", "دولة مدنية", "دولة تجارية"]},
            {q: "ماذا تفعل في حال تعطل اللاسلكي؟", o: ["مغادرة الموقع", "استخدام الإشارات البديلة", "النوم"]}
        ];

        let cur = 0;
        function startTest() {
            document.getElementById('entry').style.display = 'none';
            document.getElementById('exam').style.display = 'block';
            loadQ();
            let s = 600;
            setInterval(() => {
                let m = Math.floor(s/60), sec = s%60;
                document.getElementById('timer').innerText = `${m}:${sec<10?'0':''}${sec}`;
                if(s-- <= 0) location.reload();
            }, 1000);
        }

        function loadQ() {
            document.getElementById('step').innerText = `المهمة ${cur+1} من ${data.length}`;
            document.getElementById('qText').innerText = data[cur].q;
            const box = document.getElementById('opts');
            box.innerHTML = "";
            document.getElementById('next').style.display = 'none';
            data[cur].o.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'opt-btn'; b.innerText = opt;
                b.onclick = () => {
                    document.querySelectorAll('.opt-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    document.getElementById('next').style.display = 'block';
                };
                box.appendChild(b);
            });
        }

        function goNext() {
            if(cur < data.length - 1) { cur++; loadQ(); }
            else { showMsg("تم إرسال التقرير النهائي"); setTimeout(() => location.reload(), 2000); }
        }

        // وظائف الإدارة
        function setVal(k, i) { localStorage.setItem(k, document.getElementById(i).value); showMsg("تم التحديث"); location.reload(); }
        function toggleLock() { 
            const l = localStorage.getItem('lock') === 'true';
            localStorage.setItem('lock', !l); showMsg(l ? "تم فتح النظام" : "تم قفل النظام"); 
        }
        function resetAll() { if(confirm("تصفير؟")) { localStorage.clear(); location.reload(); } }

        window.onload = () => {
            const t = localStorage.getItem('title');
            if(t) document.getElementById('subText').innerText = t;
        };
    </script>
</body>
</html>
