<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مارفل العسكري | الإصدار الكامل</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAALZ-v8wA_5mjUVSqW1uLXMwMkskpDaGM",
            authDomain: "mmca-authority.firebaseapp.com",
            databaseURL: "https://mmca-authority-default-rtdb.firebaseio.com",
            projectId: "mmca-authority",
            storageBucket: "mmca-authority.firebasestorage.app",
            messagingSenderId: "105278081999",
            appId: "1:105278081999:web:b24e7fc8aba9aaf76ca0ba",
            measurementId: "G-F42TJTC95C"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentUser = null;

        // --- المواضيع العشرة المعتمدة ---
        const militaryTopics = [
            "قانون الانضباط العسكري وقيم الجندية",
            "فنون التمويه والتخفي في البيئات المختلفة",
            "تكتيكات المداهمة والاقتحام الحضري",
            "إدارة الأزمات والتعامل مع الرهائن",
            "أمن المنشآت الحيوية والحراسات",
            "مهارات الاستطلاع وجمع المعلومات الميدانية",
            "الإسعافات الأولية في أرض المعركة",
            "التعامل مع المتفجرات والأجسام المشبوهة",
            "سلاسل الإمداد والدعم اللوجستي العسكري",
            "القيادة العسكرية واتخاذ القرار تحت الضغط"
        ];

        // تهيئة المواضيع في Firebase عند أول تشغيل (اختياري)
        window.initTopicsInDB = () => {
            set(ref(db, 'settings/topics'), militaryTopics);
        };

        window.writeLog = (logNum, message) => {
            push(ref(db, `logs/L${logNum}`), {
                msg: message, user: currentUser ? currentUser.name : "System", time: new Date().toLocaleTimeString('ar-EG')
            });
        };

        window.validateAndLogin = () => {
            const id = document.getElementById('in-id').value;
            const name = document.getElementById('in-name').value;
            const role = document.getElementById('in-role').value;
            const pass = document.getElementById('in-pass').value;

            if(!id || !name) return alert("يرجى إكمال البيانات!");
            if(role !== 'متدرب' && pass !== '2121') return alert("الباسورد غير صحيح!");

            currentUser = { id, name, role };
            if(role === 'متدرب') {
                switchPage('page-student');
                set(ref(db, 'requests/' + id), { name, id, status: 'waiting' });
                onValue(ref(db, 'requests/' + id), (snap) => {
                    if(snap.val()?.status === 'accepted') {
                        document.getElementById('st-waiting').classList.add('hidden');
                        document.getElementById('st-exam').classList.remove('hidden');
                        loadExamTopics();
                    }
                });
            } else {
                switchPage(role === 'مشرف' ? 'page-admin' : 'page-logs');
                role === 'مشرف' ? initAdmin() : initLogs();
            }
        };

        // تحميل المواضيع للمتدرب
        function loadExamTopics() {
            onValue(ref(db, 'settings/topics'), (snap) => {
                const topics = snap.val() || militaryTopics;
                const container = document.getElementById('exam-questions');
                container.innerHTML = "";
                topics.forEach((t, i) => {
                    container.innerHTML += `
                        <div class="q-card">
                            <h4>الموضوع ${i+1}: ${t}</h4>
                            <textarea placeholder="اكتب تحليلك العسكري هنا..."></textarea>
                        </div>`;
                });
            });
        }

        // تحديث المواضيع من صفحة اللوقات
        window.saveNewTopic = (index) => {
            const newVal = document.getElementById(`edit-t-${index}`).value;
            update(ref(db, `settings/topics`), { [index]: newVal });
            alert("تم تحديث الموضوع بنجاح!");
            writeLog(10, `تم تعديل الموضوع رقم ${index+1}`);
        };

        // --- وظائف الإدارة واللوقات ---
        function initAdmin() {
            onValue(ref(db, 'requests'), (snap) => {
                const list = document.getElementById('admin-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const u = c.val();
                    if(u.status === 'waiting') {
                        list.innerHTML += `<div class="card"><span>${u.name}</span> 
                        <div><button class="btn-s" onclick="updateStatus('${u.id}','accepted')">قبول</button>
                        <button class="btn-d" onclick="updateStatus('${u.id}','rejected')">رفض</button></div></div>`;
                    }
                });
            });
        }

        window.updateStatus = (id, s) => { update(ref(db, `requests/${id}`), {status: s}); writeLog(1, `قرار ${s} للمتدرب ${id}`); };

        function initLogs() {
            const editor = document.getElementById('topics-editor');
            editor.innerHTML = "";
            onValue(ref(db, 'settings/topics'), (snap) => {
                const topics = snap.val() || militaryTopics;
                editor.innerHTML = "<h3>📝 تعديل مواضيع الاختبار العشرة</h3>";
                topics.forEach((t, i) => {
                    editor.innerHTML += `<div style="margin-bottom:10px;">
                        <input type="text" id="edit-t-${i}" value="${t}" style="width:70%;">
                        <button class="btn-s" onclick="saveNewTopic(${i})">حفظ</button>
                    </div>`;
                });
            });

            [1, 3, 5, 10].forEach(n => {
                onValue(ref(db, `logs/L${n}`), (snap) => {
                    const b = document.getElementById(`L${n}`); b.innerHTML = "";
                    snap.forEach(l => b.innerHTML = `<div>[${l.val().time}] ${l.val().msg}</div>` + b.innerHTML);
                });
            });
        }

        window.switchPage = (id) => {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };
    </script>

    <style>
        :root { --p: #1a3a5f; --a: #3498db; --bg: #050a10; --card: #0e1a2e; --s: #27ae60; --d: #c0392b; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; direction: rtl; margin: 0; }
        .container { max-width: 950px; margin: 30px auto; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #222; }
        .hidden { display: none !important; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #333; border-radius: 8px; }
        .btn-main { background: var(--p); border: none; color: #fff; padding: 15px; cursor: pointer; width: 100%; border-radius: 8px; font-weight: bold; }
        .card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-right: 4px solid var(--a); }
        .q-card { background: #0a1425; padding: 20px; border-radius: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--p); }
        .log-box { height: 120px; overflow-y: auto; background: #000; color: #00ff41; padding: 10px; font-family: monospace; font-size: 11px; border: 1px solid #222; }
        .btn-s { background: var(--s); color: #fff; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .btn-d { background: var(--d); color: #fff; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; margin-right: 5px; }
    </style>
</head>
<body>

    <div id="page-auth" class="container">
        <h2 style="text-align:center; color:var(--a);">نظام مارفل العسكري | بوابة القيادة</h2>
        <input type="text" id="in-id" placeholder="أيدي الديسكورد">
        <input type="text" id="in-name" placeholder="الاسم الرباعي">
        <select id="in-role" onchange="document.getElementById('p-div').classList.toggle('hidden', this.value==='متدرب')">
            <option value="متدرب">دخول كمتدرب</option>
            <option value="مشرف">دخول كمشرف (2121)</option>
            <option value="لوقات">دخول كمسؤول مراجعة (2121)</option>
        </select>
        <div id="p-div" class="hidden"><input type="password" id="in-pass" placeholder="كلمة المرور"></div>
        <button class="btn-main" onclick="validateAndLogin()">دخول النظام</button>
    </div>

    <div id="page-student" class="container hidden">
        <div id="st-waiting" style="text-align:center; padding:50px;">
            <h3>جاري التدقيق في هويتك... يرجى الانتظار</h3>
        </div>
        <div id="st-exam" class="hidden">
            <h2 style="color:var(--a)">الاختبار العسكري الشامل</h2>
            <div id="exam-questions"></div>
            <button class="btn-main" style="background:var(--s)" onclick="alert('تم إرسال الإجابات للمشرف')">تسليم الاختبار النهائي</button>
        </div>
    </div>

    <div id="page-admin" class="container hidden">
        <h3>إدارة الطلبات الميدانية</h3>
        <div id="admin-list"></div>
    </div>

    <div id="page-logs" class="container hidden">
        <div id="topics-editor" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; margin-bottom: 20px;">
            </div>

        <h3>📁 السجلات الأمنية (Logs)</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div><h4>لوقات القبول</h4><div class="log-box" id="L1"></div></div>
            <div><h4>لوقات التعديلات</h4><div class="log-box" id="L10"></div></div>
            <div><h4>لوقات الدخول</h4><div class="log-box" id="L3"></div></div>
            <div><h4>لوقات المشرفين</h4><div class="log-box" id="L5"></div></div>
        </div>
    </div>

</body>
</html>
