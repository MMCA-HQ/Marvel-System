<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة هيئة تنظيم الدورات | دولة مارفل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00d4ff; --g: #ffcc00; --r: #ff4b2b; --bg: #050507; --c: #0d0d12; }
        body { margin: 0; padding: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; transition: 0.3s; }
        body.alert-border { border: 10px solid var(--r); box-shadow: inset 0 0 50px var(--r); }
        .section { display: none; width: 100%; max-width: 700px; padding: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #mAlert { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(13, 13, 18, 0.98); border: 1px solid var(--p); padding: 15px 40px; border-radius: 12px; z-index: 9999; box-shadow: 0 0 20px var(--p); text-align: center; font-weight: bold; }
        .m-box { background: var(--c); padding: 30px; border-radius: 25px; border: 1px solid rgba(0, 212, 255, 0.1); box-shadow: 0 0 60px rgba(0,0,0,0.9); text-align: center; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-family: 'Cairo'; transition: 0.3s; background: #5865F2; color: white; margin-top: 15px; }
        .btn-gold { background: var(--g); color: black; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; text-align: center; font-family: 'Cairo'; box-sizing: border-box; }
        #gateway { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 8000; justify-content: center; align-items: center; }
        footer { position: fixed; bottom: 20px; width: 100%; text-align: center; display: none; }
        .rights { font-size: 0.8rem; color: #111; cursor: default; user-select: none; }
        .q-item { background: #1a1a25; padding: 20px; border-radius: 15px; border-right: 5px solid var(--p); margin: 15px 0; text-align: right; }
        .opt { display: block; background: #000; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; cursor: pointer; }
        .opt:hover { border-color: var(--p); }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="mAlert">نظام مارفل السيادي</div>

    <div id="entry" class="section" style="display: block;">
        <div class="m-box">
            <h1 style="font-size: 3rem; margin: 10px 0;">دولة مارفل</h1>
            <p id="subText">النظام الموحد للاختبارات الإلكترونية</p>
            <button class="btn" onclick="verify()">التحقق من الهوية الرقمية</button>
        </div>
    </div>

    <div id="exam" class="section">
        <div id="timer" style="position:fixed; top:20px; left:20px; font-weight:900; color:var(--p); font-size:1.4rem;">10:00</div>
        <div class="m-box">
            <div id="qArea"></div>
            <button id="nextBtn" class="btn" style="display:none;" onclick="nextQ()">المهمة التالية</button>
        </div>
    </div>

    <div id="admin" class="section">
        <div class="m-box">
            <h2 style="color: var(--g);">إدارة المنظومة (الرئيس)</h2>
            <p>أضف الأسئلة أدناه (سؤال في كل سطر)</p>
            <textarea id="qInput" rows="5" placeholder="اكتب الأسئلة هنا..."></textarea>
            <button class="btn btn-gold" onclick="saveQs()">حفظ وحقن الأسئلة</button>
            <button class="btn" style="background: #222;" onclick="location.reload()">تسجيل خروج</button>
        </div>
    </div>

    <div id="gateway">
        <div style="text-align: center;">
            <input type="password" id="pass" maxlength="4" oninput="checkP()" placeholder="••••" style="font-size: 2.5rem; letter-spacing: 15px; width: 220px;">
        </div>
    </div>

    <footer><div class="rights" id="trig">هيئة تنظيم الدورات العسكرية</div></footer>

    <script>
        let myQs = JSON.parse(localStorage.getItem('savedQs')) || ["ما هو الإجراء الأول عند رصد متسلل؟"];
        let cur = 0;

        function showA(m) {
            const a = document.getElementById('mAlert');
            a.innerText = m; a.style.display = 'block';
            setTimeout(() => a.style.display = 'none', 3000);
        }

        function verify() {
            document.querySelector('footer').style.display = 'block';
            showA("تم التحقق بنجاح");
            setTimeout(() => { 
                document.getElementById('entry').style.display = 'none';
                document.getElementById('exam').style.display = 'block';
                loadTest();
            }, 1500);
        }

        // لوحة الرئيس
        document.getElementById('trig').ondblclick = () => {
            document.getElementById('gateway').style.display = 'flex';
            document.getElementById('pass').focus();
        };

        function checkP() {
            if(document.getElementById('pass').value === '9999') {
                document.getElementById('gateway').style.display = 'none';
                document.getElementById('entry').style.display = 'none';
                document.getElementById('exam').style.display = 'none';
                document.getElementById('admin').style.display = 'block';
                document.getElementById('qInput').value = myQs.join('\n');
            }
        }

        function saveQs() {
            const lines = document.getElementById('qInput').value.split('\n').filter(l => l.trim() !== "");
            localStorage.setItem('savedQs', JSON.stringify(lines));
            showA("تم حقن الأسئلة بنجاح");
            setTimeout(() => location.reload(), 1000);
        }

        // تشغيل الاختبار
        function loadTest() {
            if(cur < myQs.length) {
                document.getElementById('qArea').innerHTML = `
                    <div class="q-item">
                        <h3>السؤال ${cur+1}:</h3>
                        <p>${myQs[cur]}</p>
                        <div class="opt" onclick="sel()">إجابة نموذجية أ</div>
                        <div class="opt" onclick="sel()">إجابة نموذجية ب</div>
                    </div>
                `;
                document.getElementById('nextBtn').style.display = 'none';
            } else {
                showA("تم انتهاء الاختبار");
                setTimeout(() => location.reload(), 2000);
            }
        }

        function sel() { document.getElementById('nextBtn').style.display = 'block'; }
        function nextQ() { cur++; loadTest(); }

        // حماية
        window.onblur = () => document.body.classList.add('alert-border');
        window.onfocus = () => document.body.classList.remove('alert-border');
    </script>
</body>
</html>
