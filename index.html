<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARVEL MILITARY SYSTEM 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAALZ-v8wA_5mjUVSqW1uLXMwMkskpDaGM",
            authDomain: "mmca-authority.firebaseapp.com",
            databaseURL: "https://mmca-authority-default-rtdb.firebaseio.com",
            projectId: "mmca-authority",
            storageBucket: "mmca-authority.firebasestorage.app",
            messagingSenderId: "105278081999",
            appId: "1:105278081999:web:b24e7fc8aba9aaf76ca0ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const CLIENT_ID = "1470440081612603465";
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        let currentUser = null;
        let examQuestions = [];
        let currentQIndex = 0;
        let examTimer;

        // --- المساعد الذكي للوقات ---
        window.logAction = (ch, msg, target = null, extra = null) => {
            push(ref(db, `logs/L${ch}`), {
                t: new Date().toLocaleString('ar-EG'),
                id: currentUser?.id || "SYSTEM",
                m: msg,
                tgt: target,
                ex: extra
            });
        };

        window.switchView = (id) => {
            document.querySelectorAll('.view').forEach(v => {
                v.style.opacity = '0';
                setTimeout(() => v.classList.add('hidden'), 300);
            });
            setTimeout(() => {
                const target = document.getElementById(id);
                target.classList.remove('hidden');
                setTimeout(() => target.style.opacity = '1', 50);
            }, 350);
            if(id === 'view-admin') loadAdmin();
            if(id === 'view-marvel') loadMarvel();
        };

        window.loginDiscord = () => {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
        };

        window.onload = async () => {
            const params = new URLSearchParams(window.location.hash.slice(1));
            const token = params.get("access_token");
            if (token) {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } });
                currentUser = await res.json();
                window.history.replaceState({}, "", window.location.pathname);
                switchView('view-requirements');
                logAction(1, "دخول النظام");
            } else {
                switchView('view-auth');
            }
            onValue(ref(db, 'course_info'), s => {
                if(s.exists()) document.querySelectorAll('.course-title').forEach(el => el.innerText = s.val().name);
            });
        };

        // --- محرك الاختبار المطور ---
        window.startExam = async () => {
            const snap = await get(ref(db, 'questions_bank'));
            examQuestions = []; snap.forEach(q => examQuestions.push({id: q.key, ...q.val()}));
            currentQIndex = 0;
            switchView('view-exam');
            showQuestion();
        };

        function showQuestion() {
            const q = examQuestions[currentQIndex];
            const container = document.getElementById('exam-box');
            let time = q.duration || 30;
            container.innerHTML = `
                <div class="q-card">
                    <div class="progress-bar"><div class="progress-fill" style="width:${((currentQIndex+1)/examQuestions.length)*100}%"></div></div>
                    <small>السؤال ${currentQIndex+1}/${examQuestions.length}</small>
                    <h2 class="q-text">${q.text}</h2>
                    <div class="options-grid" id="opts"></div>
                </div>`;
            
            const optsDiv = document.getElementById('opts');
            if(q.type === 'choice') {
                q.options.forEach(o => {
                    const btn = document.createElement('div');
                    btn.className = 'opt-item';
                    btn.innerText = o;
                    btn.onclick = () => selectOpt(o);
                    optsDiv.appendChild(btn);
                });
            } else {
                optsDiv.innerHTML = `<textarea id="essay" class="mil-input" placeholder="اكتب الإجابة الفنية هنا..."></textarea>`;
            }

            document.getElementById('timer').innerText = time;
            clearInterval(examTimer);
            examTimer = setInterval(() => {
                time--;
                document.getElementById('timer').innerText = time;
                if(time <= 0) commitAnswer();
            }, 1000);
        }

        window.commitAnswer = () => {
            const q = examQuestions[currentQIndex];
            let ans = q.type === 'choice' ? window.selectedAns : document.getElementById('essay')?.value;
            set(ref(db, `results/${currentUser.id}/${q.id}`), {
                q: q.text, a: ans || "تجاوز الوقت", s: "", u: currentUser.username
            });
            currentQIndex++;
            if(currentQIndex < examQuestions.length) showQuestion();
            else finishExam();
        };

        function selectOpt(val) {
            window.selectedAns = val;
            document.querySelectorAll('.opt-item').forEach(el => el.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        function finishExam() {
            clearInterval(examTimer);
            switchView('view-finish');
            logAction(8, "أنهى الاختبار");
        }

        // --- البوابات الذكية ---
        window.openGate = (key) => {
            const p = prompt("CODE:");
            if(key === 'R' && p === '0101') switchView('view-admin');
            else if(key === 'M' && p === '9999') switchView('view-marvel');
            else logAction(3, "تنبيه: محاولة دخول غير مصرح");
        };

        // --- لوحة التحكم (رؤية AI) ---
        function loadAdmin() {
            onValue(ref(db, 'applications'), s => {
                const list = document.getElementById('app-list'); list.innerHTML = "";
                s.forEach(a => {
                    const d = a.val();
                    list.innerHTML += `<div class="data-row">
                        <span>${d.name}</span>
                        <div class="actions">
                            <button onclick="setStatus('${a.key}','accepted')">قبول</button>
                            <button class="btn-red" onclick="setStatus('${a.key}','rejected')">رفض</button>
                        </div>
                    </div>`;
                });
            });
        }

        window.setStatus = (id, s) => { 
            update(ref(db, `applications/${id}`), {status: s}); 
            logAction(4, `تغيير حالة`, id, s);
        };

    </script>
    <style>
        :root { --glow: #00f2ff; --bg: #05070a; --card: #0c1016; --border: #1b232e; --text: #e1e1e1; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; overflow: hidden; direction: rtl; }
        .view { height: 100vh; display: flex; align-items: center; justify-content: center; transition: 0.4s; opacity: 0; position: absolute; width: 100%; }
        .hidden { display: none !important; }
        
        /* تصميم عسكري مستقبلي */
        .glass-card { background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: 20px; width: 90%; max-width: 500px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.05); position: relative; }
        .glass-card::before { content: ''; position: absolute; top: -1px; left: 50%; transform: translateX(-50%); width: 100px; height: 2px; background: var(--glow); box-shadow: 0 0 10px var(--glow); }

        .mil-input { width: 100%; background: #010204; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 8px; margin: 10px 0; font-family: 'Cairo'; outline: none; transition: 0.3s; }
        .mil-input:focus { border-color: var(--glow); box-shadow: 0 0 10px rgba(0,242,255,0.2); }

        .btn-prime { width: 100%; padding: 15px; border: none; background: linear-gradient(45deg, #0084ff, #00f2ff); color: #000; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 20px; }
        .btn-red { background: #ff3c3c !important; color: #fff; }

        /* واجهة الاختبار */
        #timer { font-family: 'Orbitron'; color: var(--glow); font-size: 2.5rem; text-shadow: 0 0 15px var(--glow); }
        .opt-item { background: #11161d; border: 1px solid var(--border); padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; transition: 0.2s; text-align: right; }
        .opt-item:hover, .opt-item.selected { border-color: var(--glow); background: rgba(0,242,255,0.1); }
        
        /* الجداول والبيانات */
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); }
        .progress-bar { height: 4px; background: #111; border-radius: 10px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: var(--glow); transition: 0.5s; }

        .footer { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 30px; font-size: 10px; letter-spacing: 2px; color: #333; }
        .gate-trigger { cursor: pointer; transition: 0.3s; }
        .gate-trigger:hover { color: var(--glow); }
    </style>
</head>
<body>

    <div id="view-auth" class="view">
        <div class="glass-card" style="text-align: center;">
            <h1 style="font-family: 'Orbitron'; font-weight: 900; margin: 0; color: #fff;">MARVEL</h1>
            <p style="font-size: 12px; color: var(--glow); margin-bottom: 30px;">AUTHORITY CONTROL SYSTEM</p>
            <button class="btn-prime" onclick="loginDiscord()">التحقق عبر الهوية الرقمية</button>
        </div>
    </div>

    <div id="view-requirements" class="view hidden">
        <div class="glass-card">
            <h2 class="course-title">...</h2>
            <input type="text" id="req-name" class="mil-input" placeholder="الاسم الكامل">
            <input type="text" id="req-code" class="mil-input" placeholder="الكود التعريفي">
            <button class="btn-prime" onclick="switchView('view-waiting'); logAction(1, 'أرسل الطلب')">إرسال البيانات</button>
        </div>
    </div>

    <div id="view-waiting" class="view hidden">
        <div style="text-align: center;">
            <div id="timer" style="font-size: 1rem; margin-bottom: 10px;">ANALYZING DATA...</div>
            <p>بانتظار موافقة القيادة العليا</p>
            <button onclick="startExam()" style="font-size: 10px; opacity: 0.2;">تجاوز (للتجربة)</button>
        </div>
    </div>

    <div id="view-exam" class="view hidden">
        <div class="glass-card" style="max-width: 700px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span class="course-title" style="font-size: 12px; opacity: 0.5;"></span>
                <div id="timer">00</div>
            </div>
            <div id="exam-box"></div>
            <button class="btn-prime" onclick="commitAnswer()">تأكيد وإرسال</button>
        </div>
    </div>

    <div id="view-finish" class="view hidden">
        <div class="glass-card" style="text-align: center;">
            <h2 style="color: var(--glow);">MISSION ACCOMPLISHED</h2>
            <p>تم مزامنة بياناتك مع السجل العسكري بنجاح.</p>
            <button class="btn-prime" onclick="location.reload()">الخروج</button>
        </div>
    </div>

    <div id="view-admin" class="view hidden">
        <div class="glass-card" style="max-width: 800px;">
            <h3>الطلبات الواردة</h3>
            <div id="app-list"></div>
            <button class="btn-prime" onclick="location.reload()" style="background: #111; color: #fff;">إغلاق اللوحة</button>
        </div>
    </div>

    <div class="footer">
        <span class="gate-trigger" onclick="openGate('R')">RIGHTS_V3</span>
        <span>|</span>
        <span class="gate-trigger" onclick="openGate('M')">MARVEL_CORE_2026</span>
    </div>

</body>
</html>
