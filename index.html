<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هيئة تنظيم الدورات | دولة مارفل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #00d4ff;
            --secondary-glow: #6a0dad;
            --bg-dark: #0a0a0c;
            --card-bg: #121217;
            --text-silver: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-silver);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0c 100%);
        }

        /* حاوية النظام */
        .system-container {
            width: 450px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(106, 13, 173, 0.2);
            text-align: center;
            position: relative;
        }

        .system-container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--secondary-glow), transparent, var(--primary-glow));
            border-radius: 22px;
            z-index: -1;
            opacity: 0.3;
        }

        .badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            margin-bottom: 15px;
            display: inline-block;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 10px 0;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .course-title {
            color: var(--primary-glow);
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .system-desc {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 40px;
        }

        /* حقول الإدخال */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            color: white;
            text-align: center;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input[type="password"]:focus {
            border-color: var(--primary-glow);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        /* أزرار الدخول */
        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--primary-glow);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .btn-login:hover {
            background: white;
            box-shadow: 0 0 20px var(--primary-glow);
            transform: translateY(-2px);
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.7rem;
            color: #444;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="system-container">
        <div class="badge">هيئة تنظيم الدورات العسكرية</div>
        <h1>دولة مارفل</h1>
        <div class="course-title" id="courseName">الدورة</div>
        <p class="system-desc">النظام الموحد للاختبارات الإلكترونية</p>

        <form id="loginForm">
            <div class="input-group">
                <input type="password" id="accessCode" placeholder="أدخل كود الولوج الرسمي" required>
            </div>
            <button type="submit" class="btn-login">الولوج عبر الهوية الرقمية</button>
        </form>
    </div>

    <footer>
        جميع الحقوق محفوظة © هيئة الدورات العسكرية | دولة مارفل 2026
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const code = document.getElementById('accessCode').value;

            if (code === '9999') {
                alert('مرحباً بك سيادة رئيس هيئة تنظيم الدورات');
                // هنا سيتم التوجيه لصفحة الرئيس
            } else if (code === '0101') {
                alert('مرحباً بكم أعضاء هيئة تنظيم الدورات');
                // هنا سيتم التوجيه لصفحة الأعضاء
            } else {
                alert('عذراً، كود الولوج غير صحيح أو غير مصرح لك بالدخول');
            }
        });
    </script>
</body>
</html>
