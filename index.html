<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة هيئة تنظيم الدورات | دولة مارفل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3d5afe; --bg: #0a0a0f; --card: #12121c; }
        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background: var(--bg); color: white;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }
        .marvel-card {
            background: var(--card); padding: 40px; border-radius: 20px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 350px;
        }
        .badge { border: 1px solid var(--primary); color: var(--primary); padding: 5px 15px; border-radius: 5px; font-size: 0.8rem; margin-bottom: 20px; display: inline-block; }
        h1 { font-size: 2.5rem; margin: 10px 0; font-weight: 900; }
        p { color: #666; margin-bottom: 30px; font-size: 0.9rem; }
        .btn {
            background: var(--primary); color: white; border: none;
            padding: 15px; width: 100%; border-radius: 12px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(61, 90, 254, 0.4);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(61, 90, 254, 0.6); }
        
        /* التنبيه المخصص */
        #alertBox { display: none; position: fixed; top: 20px; background: #1a1a2e; border: 1px solid var(--primary); padding: 10px 20px; border-radius: 10px; z-index: 1000; }

        /* الأقسام المخفية */
        .hidden-section { display: none; width: 90%; max-width: 600px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        footer { position: fixed; bottom: 20px; color: #111; cursor: pointer; font-size: 0.7rem; user-select: none; }
    </style>
</head>
<body>

    <div id="alertBox">جاري معالجة البيانات...</div>

    <div id="loginScreen">
        <div class="marvel-card">
            <div class="badge">نظام الهيئة الرقمي</div>
            <h1>دولة مارفل</h1>
            <p>يرجى إثبات الهوية للوصول للمنظومة</p>
            <button class="btn" onclick="startSystem()">التحقق من الهوية الرقمية</button>
        </div>
    </div>

    <div id="testScreen" class="hidden-section">
        <h2 style="text-align: center;">بدء الاختبار العسكري</h2>
        <div style="background: #111; padding: 20px; border-radius: 15px; border-right: 5px solid var(--primary);">
            <p id="qText" style="color: white; font-size: 1.1rem;">جاري تحميل المهمة رقم 1...</p>
            <div id="options">
                </div>
        </div>
    </div>

    <footer id="secretTrigger">هيئة تنظيم الدورات العسكرية</footer>

    <script>
        function startSystem() {
            document.getElementById('alertBox').style.display = 'block';
            document.getElementById('alertBox').innerText = "تم التحقق بنجاح";
            setTimeout(() => {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('testScreen').style.display = 'block';
                document.getElementById('alertBox').style.display = 'none';
            }, 1500);
        }

        // منع الزر الأيمن للحماية
        document.oncontextmenu = () => false;
    </script>
</body>
</html>
