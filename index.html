<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARVEL AUTHORITY | CLASSIFIED SYSTEM</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAALZ-v8wA_5mjUVSqW1uLXMwMkskpDaGM",
            authDomain: "mmca-authority.firebaseapp.com",
            databaseURL: "https://mmca-authority-default-rtdb.firebaseio.com",
            projectId: "mmca-authority",
            storageBucket: "mmca-authority.firebasestorage.app",
            messagingSenderId: "105278081999",
            appId: "1:105278081999:web:b24e7fc8aba9aaf76ca0ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let questions = [];
        let currentQIndex = 0;
        let timerInterval;
        let userSession = null;

        // --- محرك الدخول الذكي (كشف الهوية) ---
        window.login = () => {
            const name = document.getElementById('d-name').value;
            const id = document.getElementById('d-id').value;
            const secret = document.getElementById('d-secret').value;

            if(!name || !id) return alert("⚠️ يرجى إدخال بيانات الديسكورد.");

            // إذا أدخل الكود السري يفتح لوحة الإدارة فوراً
            if(secret === '2121') {
                userSession = { name, id, role: 'admin' };
                showView('view-management');
                initManagement();
                writeLog(5, `المسؤول [${name}] ولج إلى مركز التحكم السري.`);
            } else {
                userSession = { name, id, role: 'trainee' };
                showView('view-trainee');
                set(ref(db, 'requests/' + id), { name, id, status: 'waiting', timestamp: Date.now() });
                listenToStatus(id);
                writeLog(3, `متدرب جديد في قائمة الانتظار: ${name}`);
            }
        };

        // --- محرك الاختبار (توقيت 30/15) ---
        function listenToStatus(uid) {
            onValue(ref(db, 'requests/' + uid), (snap) => {
                const data = snap.val();
                if(data?.status === 'accepted') {
                    document.getElementById('trainee-wait').classList.add('hidden');
                    document.getElementById('exam-area').classList.remove('hidden');
                    startExam();
                }
            });
        }

        function startExam() {
            onValue(ref(db, 'exam_bank'), (snap) => {
                questions = [];
                snap.forEach(child => { questions.push({id: child.key, ...child.val()}); });
                if(questions.length > 0) showQuestion(0);
            }, { onlyOnce: true });
        }

        function showQuestion(index) {
            if(index >= questions.length) { finishExam(); return; }

            const q = questions[index];
            const timerEl = document.getElementById('timer-num');
            let timeLeft = q.type === 'choice' ? 15 : 30;
            
            timerEl.innerText = timeLeft;
            renderUI(q, index);

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if(timeLeft <= 0) nextQ();
            }, 1000);
        }

        function renderUI(q, i) {
            const container = document.getElementById('q-display');
            let html = `<div class="step">المهمة ${i+1}</div><h2>${q.text}</h2>`;
            if(q.type === 'choice') {
                html += `<div class="grid">`;
                q.options.forEach(opt => html += `<button class="opt-btn" onclick="nextQ()">${opt}</button>`);
                html += `</div>`;
            } else {
                html += `<textarea class="essay-box" placeholder="اكتب تقريرك العسكري هنا..."></textarea>`;
            }
            container.innerHTML = html;
        }

        window.nextQ = () => { currentQIndex++; showQuestion(currentQIndex); };

        function finishExam() {
            clearInterval(timerInterval);
            document.getElementById('exam-area').innerHTML = "<div class='finish'>✅ تمت المهمة. انتظر النتائج في الديسكورد.</div>";
            writeLog(1, `أكمل ${userSession.name} الاختبار.`);
        }

        // --- لوحة الإدارة (مخفية) ---
        function initManagement() {
            onValue(ref(db, 'requests'), (snap) => {
                const list = document.getElementById('admin-reqs');
                list.innerHTML = "";
                snap.forEach(c => {
                    const r = c.val();
                    if(r.status === 'waiting') {
                        list.innerHTML += `<div class="row"><span>${r.name}</span>
                        <div><button class="b-acc" onclick="action('${r.id}','accepted')">قبول</button>
                        <button class="b-rej" onclick="action('${r.id}','rejected')">رفض</button></div></div>`;
                    }
                });
            });

            onValue(ref(db, 'exam_bank'), (snap) => {
                const list = document.getElementById('admin-qs');
                list.innerHTML = "";
                snap.forEach(c => {
                    list.innerHTML += `<div class="row"><span>${c.val().text}</span>
                    <button class="b-rej" onclick="delQ('${c.key}')">حذف</button></div>`;
                });
            });

            // اللوقات
            [1, 3, 5].forEach(n => {
                onValue(ref(db, `logs/L${n}`), (snap) => {
                    const b = document.getElementById(`log-${n}`); b.innerHTML = "";
                    snap.forEach(l => b.innerHTML = `<div>[${l.val().time}] ${l.val().msg}</div>` + b.innerHTML);
                });
            });
        }

        window.action = (id, s) => update(ref(db, `requests/${id}`), {status: s});
        window.delQ = (id) => remove(ref(db, `exam_bank/${id}`));
        window.addQ = () => {
            const text = document.getElementById('add-txt').value;
            const type = document.getElementById('add-type').value;
            let options = null;
            if(type === 'choice') { options = prompt("أدخل الخيارات (نعم,لا)").split(','); }
            push(ref(db, 'exam_bank'), { text, type, options });
            alert("تم!");
        };

        function writeLog(t, m) { push(ref(db, `logs/L${t}`), { msg: m, time: new Date().toLocaleTimeString('ar-EG') }); }
        function showView(id) { document.querySelectorAll('.view').forEach(v => v.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    </script>

    <style>
        :root { --p: #5865F2; --bg: #0b0e14; --card: #151921; --s: #23a559; --d: #da373c; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; direction: rtl; margin: 0; }
        .view { max-width: 800px; margin: 50px auto; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #222; }
        .hidden { display: none !important; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #0b0e14; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .timer { font-size: 20px; color: var(--d); background: rgba(218,55,60,0.1); padding: 10px; border-radius: 30px; display: inline-block; margin-bottom: 20px; }
        .opt-btn { width: 100%; padding: 15px; margin-bottom: 8px; background: #1e2329; border: 1px solid #333; color: #fff; border-radius: 10px; text-align: right; cursor: pointer; }
        .row { display: flex; justify-content: space-between; align-items: center; background: #0b0e14; padding: 12px; margin-bottom: 8px; border-radius: 8px; }
        .b-acc { background: var(--s); border: none; color: white; padding: 6px 12px; border-radius: 4px; }
        .b-rej { background: var(--d); border: none; color: white; padding: 6px 12px; border-radius: 4px; }
        .log-box { height: 100px; overflow-y: auto; background: #000; color: #00ff00; font-family: monospace; font-size: 11px; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="view-auth" class="view">
        <h1 style="text-align:center; color:var(--p)">MARVEL AUTHORITY</h1>
        <p style="text-align:center; color:#666">يرجى تسجيل الدخول عبر بيانات الديسكورد الرسمية</p>
        <div style="margin-top:30px;">
            <input type="text" id="d-name" placeholder="اسم المستخدم في ديسكورد">
            <input type="text" id="d-id" placeholder="المعرف الرقمي (Discord ID)">
            <input type="password" id="d-secret" placeholder="رمز التحقق (اختياري للمتدربين)">
            <button class="btn" onclick="login()">تسجيل الدخول للنظام</button>
        </div>
    </div>

    <div id="view-trainee" class="view hidden">
        <div id="trainee-wait" style="text-align:center; padding:40px;">
            <h2>قيد المراجعة...</h2>
            <p>سيتم تفعيل الاختبار بمجرد صدور أمر القيادة.</p>
        </div>
        <div id="exam-area" class="hidden">
            <div class="timer">الوقت المتبقي: <span id="timer-num">--</span> ثانية</div>
            <div id="q-display"></div>
        </div>
    </div>

    <div id="view-management" class="view hidden">
        <h3>👥 طلبات القبول</h3>
        <div id="admin-reqs"></div>
        
        <hr style="border:0.5px solid #222; margin:20px 0;">
        
        <h3>⚙️ إدارة الأسئلة</h3>
        <input type="text" id="add-txt" placeholder="نص السؤال">
        <select id="add-type">
            <option value="essay">مقالي (30 ث)</option>
            <option value="choice">خيارات (15 ث)</option>
        </select>
        <button class="btn" style="background:var(--s)" onclick="addQ()">إضافة السؤال</button>
        <div id="admin-qs" style="margin-top:20px;"></div>

        <hr style="border:0.5px solid #222; margin:20px 0;">

        <h3>📂 سجلات العمليات (Logs)</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><small>القبول</small><div class="log-box" id="log-1"></div></div>
            <div><small>الدخول</small><div class="log-box" id="log-3"></div></div>
            <div><small>الإدارة</small><div class="log-box" id="log-5"></div></div>
        </div>
    </div>

</body>
</html>
