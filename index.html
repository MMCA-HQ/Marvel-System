<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARVEL SYSTEM | ADVANCED EXAM</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAALZ-v8wA_5mjUVSqW1uLXMwMkskpDaGM",
            authDomain: "mmca-authority.firebaseapp.com",
            databaseURL: "https://mmca-authority-default-rtdb.firebaseio.com",
            projectId: "mmca-authority",
            storageBucket: "mmca-authority.firebasestorage.app",
            messagingSenderId: "105278081999",
            appId: "1:105278081999:web:b24e7fc8aba9aaf76ca0ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let questions = [];
        let currentQIndex = 0;
        let timerInterval;
        let userSession = null;

        // --- نظام تسجيل الدخول ---
        window.login = (role) => {
            const name = document.getElementById('d-name').value;
            const id = document.getElementById('d-id').value;
            const pass = document.getElementById('admin-pass').value;

            if(!name || !id) return alert("أدخل بياناتك!");
            if(role !== 'trainee' && pass !== '2121') return alert("رمز التحقق خطأ!");

            userSession = { name, id, role };
            if(role === 'trainee') {
                showView('view-trainee');
                set(ref(db, 'requests/' + id), { name, id, status: 'waiting' });
                listenToStatus(id);
            } else {
                showView('view-management');
                initManagement();
            }
        };

        // --- نظام الاختبار الذكي ---
        function listenToStatus(uid) {
            onValue(ref(db, 'requests/' + uid), (snap) => {
                if(snap.val()?.status === 'accepted') {
                    document.getElementById('trainee-wait').classList.add('hidden');
                    document.getElementById('exam-container').classList.remove('hidden');
                    startExamProcess();
                }
            });
        }

        function startExamProcess() {
            onValue(ref(db, 'exam_bank'), (snap) => {
                questions = [];
                snap.forEach(child => { questions.push({id: child.key, ...child.val()}); });
                if(questions.length > 0) showQuestion(0);
            });
        }

        function showQuestion(index) {
            if(index >= questions.length) {
                clearInterval(timerInterval);
                document.getElementById('exam-container').innerHTML = "<h2>تم انتهاء الاختبار، جاري رفع النتائج...</h2>";
                return;
            }

            const q = questions[index];
            const display = document.getElementById('q-display');
            const timerEl = document.getElementById('timer-num');
            
            let timeLeft = q.type === 'choice' ? 15 : 30;
            timerEl.innerText = timeLeft;

            let html = `<h3>السؤال ${index + 1}: ${q.text}</h3>`;
            if(q.type === 'choice') {
                q.options.forEach(opt => {
                    html += `<button class="opt-btn" onclick="nextQ()">${opt}</button>`;
                });
            } else {
                html += `<textarea id="ans-${index}" placeholder="اكتب إجابتك هنا..."></textarea>`;
            }
            display.innerHTML = html;

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if(timeLeft <= 0) nextQ();
            }, 1000);
        }

        window.nextQ = () => {
            currentQIndex++;
            showQuestion(currentQIndex);
        };

        // --- لوحة التحكم (إضافة/تعديل/حذف) ---
        function initManagement() {
            onValue(ref(db, 'exam_bank'), (snap) => {
                const list = document.getElementById('questions-manager');
                list.innerHTML = "";
                snap.forEach(child => {
                    const q = child.val();
                    list.innerHTML += `
                        <div class="q-item">
                            <span>${q.text} (${q.type === 'choice' ? 'خيارات' : 'مقالي'})</span>
                            <button class="b-d" onclick="deleteQ('${child.key}')">حذف</button>
                        </div>`;
                });
            });
        }

        window.addQuestion = () => {
            const text = document.getElementById('new-q-text').value;
            const type = document.getElementById('new-q-type').value;
            let options = null;
            if(type === 'choice') {
                options = prompt("أدخل الخيارات مفصولة بفاصلة (مثال: نعم,لا,ربما)").split(',');
            }
            push(ref(db, 'exam_bank'), { text, type, options });
            alert("تمت الإضافة!");
        };

        window.deleteQ = (id) => {
            if(confirm("هل أنت متأكد من حذف هذا السؤال؟")) {
                remove(ref(db, 'exam_bank/' + id));
            }
        };

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>

    <style>
        :root { --discord: #5865F2; --bg: #23272A; --card: #2C2F33; --accent: #00f2fe; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; direction: rtl; margin: 0; }
        .view { max-width: 700px; margin: 50px auto; background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        
        /* الاختبار */
        #timer { font-size: 24px; color: #ff4747; margin-bottom: 20px; font-weight: bold; }
        .opt-btn { width: 100%; padding: 12px; margin: 5px 0; background: #36393F; border: 1px solid #444; color: white; border-radius: 8px; cursor: pointer; text-align: right; }
        .opt-btn:hover { background: var(--discord); }
        textarea { width: 100%; height: 100px; background: #23272A; color: white; border: 1px solid #444; border-radius: 8px; margin-top: 10px; padding: 10px; box-sizing: border-box; }
        
        /* الإدارة */
        .q-item { background: #36393F; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .b-d { background: #f04747; border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #23272A; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-main { background: var(--discord); border: none; color: white; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="view-auth" class="view">
        <h2>تسجيل دخول النظام</h2>
        <input type="text" id="d-name" placeholder="اسم الديسكورد">
        <input type="text" id="d-id" placeholder="ID الديسكورد">
        <select id="role-select" onchange="document.getElementById('pass-wrap').classList.toggle('hidden', this.value==='trainee')">
            <option value="trainee">متدرب</option>
            <option value="staff">إدارة ومراجعة</option>
        </select>
        <div id="pass-wrap" class="hidden"><input type="password" id="admin-pass" placeholder="رمز الدخول"></div>
        <button class="btn-main" onclick="login(document.getElementById('role-select').value)">دخول</button>
    </div>

    <div id="view-trainee" class="view hidden">
        <div id="trainee-wait"><h3>بانتظار موافقة المسؤول لبدء الاختبار...</h3></div>
        <div id="exam-container" class="hidden">
            <div id="timer">الوقت المتبقي: <span id="timer-num">--</span> ثانية</div>
            <div id="q-display"></div>
        </div>
    </div>

    <div id="view-management" class="view hidden">
        <h2>لوحة التحكم بالأسئلة</h2>
        <div style="background: #1e1f22; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
            <h3>إضافة سؤال جديد</h3>
            <input type="text" id="new-q-text" placeholder="نص السؤال">
            <select id="new-q-type">
                <option value="essay">مقالي (30 ثانية)</option>
                <option value="choice">خيارات (15 ثانية)</option>
            </select>
            <button class="btn-main" style="background:#43b581" onclick="addQuestion()">إضافة للسحابة</button>
        </div>

        <h3>قائمة الأسئلة الحالية:</h3>
        <div id="questions-manager"></div>
    </div>

</body>
</html>
